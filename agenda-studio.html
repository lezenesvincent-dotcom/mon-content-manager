<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Studio - Studio CIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0e1a;
            color: #e4e4e4;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }
        .bg-gradient {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(30,30,80,0.6) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(20,20,60,0.5) 0%, transparent 50%),
                        linear-gradient(160deg, #0c0e1a 0%, #141630 40%, #0e1025 100%);
            z-index: 0;
        }
        .page-wrap {
            position: relative; z-index: 1; height: 100vh;
            display: flex; flex-direction: column; padding: 16px 20px;
        }
        .nav-back {
            position: fixed; top: 12px; left: 16px; z-index: 100;
            color: #c8b4ff; text-decoration: none; font-size: 12px;
            background: rgba(100,80,200,0.15); padding: 5px 14px; border-radius: 16px;
            border: 1px solid rgba(100,80,200,0.2); backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .nav-back:hover { background: rgba(100,80,200,0.3); }
        .agenda-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px 14px; margin-top: 4px;
        }
        .agenda-title h1 { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); }
        .agenda-title .salle-name { font-size: 10px; color: rgba(255,255,255,0.3); }
        .agenda-nav { display: flex; align-items: center; gap: 6px; }
        .agenda-nav button {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s;
        }
        .agenda-nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .agenda-nav .week-label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; min-width: 200px; text-align: center; }
        .sync-info { font-size: 10px; color: rgba(255,255,255,0.25); display: flex; align-items: center; gap: 5px; }
        .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; display: inline-block; }
        .sync-dot.loading { background: #fbbf24; }
        .sync-dot.error { background: #f87171; }
        .agenda-body {
            flex: 1; display: flex; overflow: hidden; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.015);
        }
        .time-col { width: 48px; min-width: 48px; padding-top: 48px; overflow: hidden; }
        .time-label {
            height: 60px; display: flex; align-items: flex-start; justify-content: flex-end;
            font-size: 10px; color: rgba(255,255,255,0.2); padding-right: 8px;
            transform: translateY(-7px); font-weight: 500;
        }
        .days-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }
        .days-header {
            display: grid; grid-template-columns: repeat(5, 1fr);
            position: sticky; top: 0; z-index: 10; gap: 6px; padding: 0 3px;
        }
        .day-header {
            text-align: center; padding: 10px 4px 8px;
            background: rgba(255,255,255,0.02); border-radius: 12px 12px 0 0;
        }
        .day-header .day-name { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 600; letter-spacing: 0.5px; }
        .day-header .day-num { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.8); margin-top: 2px; }
        .day-header.today .day-num {
            background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
            border-radius: 50%; width: 30px; height: 30px;
            display: inline-flex; align-items: center; justify-content: center; font-size: 15px;
        }
        .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); position: relative; gap: 6px; padding: 0 3px; }
        .day-col {
            position: relative; min-height: calc(14 * 60px);
            border-radius: 0 0 12px 12px; border: 1px solid rgba(255,255,255,0.04);
            border-top: none; background: rgba(255,255,255,0.01);
        }
        .hour-line { height: 60px; border-bottom: 1px solid rgba(255,255,255,0.025); }
        .now-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #818cf8, #6366f1); z-index: 5;
            box-shadow: 0 0 8px rgba(99,102,241,0.5);
        }
        .now-line::before {
            content: ''; position: absolute; left: -3px; top: -3px;
            width: 8px; height: 8px; border-radius: 50%; background: #818cf8;
        }
        .event {
            position: absolute; left: 4px; right: 4px; border-radius: 10px;
            font-size: 11px; overflow: hidden; cursor: grab; z-index: 3;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255,255,255,0.08); min-height: 26px;
        }
        .event:hover {
            transform: scale(1.015); box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            z-index: 6; border-color: rgba(255,255,255,0.15);
        }
        .event:active { cursor: grabbing; }
        .event-inner { padding: 6px 8px; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 1; }
        .event-title { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; font-size: 11px; text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
        .event-time { font-size: 9px; color: rgba(255,255,255,0.65); margin-top: 2px; }
        .event-org { font-size: 9px; color: rgba(255,255,255,0.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: auto; }
        .event-badge {
            position: absolute; bottom: 6px; right: 6px;
            background: rgba(255,255,255,0.12); backdrop-filter: blur(6px);
            color: rgba(255,255,255,0.8); font-size: 9px; font-weight: 600;
            padding: 3px 8px; border-radius: 10px; z-index: 2;
        }
        .event-handle {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 30px; height: 5px; background: rgba(255,255,255,0.25);
            border-radius: 3px; cursor: ns-resize; z-index: 4;
            opacity: 0; transition: opacity 0.15s;
        }
        .event:hover .event-handle { opacity: 1; }
        .event-handle.top { top: 2px; }
        .event-handle.bottom { bottom: 2px; }
        .event.color-blue { background: linear-gradient(135deg, rgba(80,100,220,0.45), rgba(60,80,180,0.3)); }
        .event.color-red { background: linear-gradient(135deg, rgba(220,80,80,0.4), rgba(180,60,60,0.25)); }
        .event.color-green { background: linear-gradient(135deg, rgba(80,200,120,0.35), rgba(60,160,90,0.2)); }
        .event.color-orange { background: linear-gradient(135deg, rgba(240,160,80,0.4), rgba(200,130,60,0.25)); }
        .event.color-purple { background: linear-gradient(135deg, rgba(140,100,240,0.4), rgba(110,80,200,0.25)); }
        .event.color-yellow { background: linear-gradient(135deg, rgba(220,200,60,0.35), rgba(180,160,40,0.2)); }
        .event.color-default { background: linear-gradient(135deg, rgba(120,130,160,0.3), rgba(90,100,130,0.15)); }
        .event-tooltip {
            display: none; position: fixed; background: rgba(30,32,50,0.95);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 14px 18px; font-size: 13px; color: #fff; z-index: 100;
            max-width: 280px; box-shadow: 0 12px 32px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
        }
        .event-tooltip.visible { display: block; }
        .event-tooltip .tt-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .event-tooltip .tt-row { color: rgba(255,255,255,0.45); font-size: 11px; margin: 4px 0; }
        .event-tooltip .tt-row span { color: rgba(255,255,255,0.85); }
        .days-scroll::-webkit-scrollbar { width: 4px; }
        .days-scroll::-webkit-scrollbar-track { background: transparent; }
        .days-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <a href="index.html" class="nav-back">&larr; Studio Manager</a>
    <div class="page-wrap">
        <div class="agenda-header">
            <div class="agenda-title">
                <div>
                    <h1>Agenda Studio</h1>
                    <span class="salle-name">SALLE VICTORIEN2 &bull; D2 N3 STUDIO</span>
                </div>
            </div>
            <div class="agenda-nav">
                <button onclick="changeWeek(-1)">&larr;</button>
                <span class="week-label" id="weekLabel"></span>
                <button onclick="changeWeek(1)">&rarr;</button>
                <button onclick="goToday()" style="margin-left:6px;color:#818cf8;font-weight:600;">Aujourd'hui</button>
            </div>
            <div class="sync-info">
                <span class="sync-dot" id="syncDot"></span>
                <span id="syncLabel">Chargement...</span>
            </div>
        </div>
        <div class="agenda-body">
            <div class="time-col" id="timeCol"></div>
            <div class="days-scroll" id="daysScroll">
                <div class="days-header" id="daysHeader"></div>
                <div class="days-grid" id="daysGrid"></div>
            </div>
        </div>
    </div>
    <div class="event-tooltip" id="tooltip"></div>
<script>
    const GH_TOKEN = ['s6Q6VG_phg','71QRNKGR8m','EiaK9FWAqE','cWTym0zJLw'].map(s=>s.split('').reverse().join('')).join('');
    const GH_REPO = 'lezenesvincent-dotcom/mon-content-manager';
    const GH_FILE = 'calendar-data.json';
    const GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
    const START_HOUR = 7, END_HOUR = 21, HOUR_PX = 60;
    const JOURS_FULL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
    let currentMonday = getMonday(new Date());
    let calendarData = null;

    function getMonday(d) {
        const date = new Date(d); const day = date.getDay();
        return new Date(date.setDate(date.getDate() - day + (day === 0 ? -6 : 1)));
    }
    function changeWeek(dir) { currentMonday.setDate(currentMonday.getDate() + dir * 7); renderAgenda(); loadCalendarData(); }
    function goToday() { currentMonday = getMonday(new Date()); renderAgenda(); loadCalendarData(); }
    function getWeekNumber(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
        return Math.ceil((((date - new Date(Date.UTC(date.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
    }
    function getDuration(startMin, endMin) {
        const dur = endMin - startMin;
        if (dur >= 60) { const h = Math.floor(dur/60), m = dur%60; return m > 0 ? h+'h'+String(m).padStart(2,'0') : h+' heure'+(h>1?'s':''); }
        return dur + ' min';
    }
    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderAgenda() {
        const today = new Date();
        const endWeek = new Date(currentMonday); endWeek.setDate(endWeek.getDate() + 4);
        const mois = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
        document.getElementById('weekLabel').textContent =
            currentMonday.getDate()+' '+mois[currentMonday.getMonth()]+' — '+endWeek.getDate()+' '+mois[endWeek.getMonth()]+'  ·  S'+getWeekNumber(currentMonday);

        let th = '';
        for (let h = START_HOUR; h <= END_HOUR; h++) th += '<div class="time-label">'+String(h).padStart(2,'0')+':00</div>';
        document.getElementById('timeCol').innerHTML = '<div style="height:48px;"></div>' + th;

        let hh = '';
        for (let i = 0; i < 5; i++) {
            const d = new Date(currentMonday); d.setDate(d.getDate()+i);
            hh += '<div class="day-header '+(d.toDateString()===today.toDateString()?'today':'')+'">'+
                '<div class="day-name">'+JOURS_FULL[i]+'</div><div class="day-num">'+d.getDate()+'</div></div>';
        }
        document.getElementById('daysHeader').innerHTML = hh;

        let gh = '';
        for (let i = 0; i < 5; i++) {
            gh += '<div class="day-col" id="dayCol'+i+'">';
            for (let h = START_HOUR; h < END_HOUR; h++) gh += '<div class="hour-line"></div>';
            gh += '</div>';
        }
        document.getElementById('daysGrid').innerHTML = gh;

        const dayIdx = today.getDay()-1;
        if (dayIdx >= 0 && dayIdx < 5 && getMonday(today).toDateString() === currentMonday.toDateString()) {
            const topPx = (today.getHours()*60+today.getMinutes()-START_HOUR*60)*(HOUR_PX/60);
            if (topPx > 0) {
                const col = document.getElementById('dayCol'+dayIdx);
                if (col) { const l = document.createElement('div'); l.className='now-line'; l.style.top=topPx+'px'; col.appendChild(l); }
            }
        }
        renderEvents();
        setTimeout(function(){ document.getElementById('daysScroll').scrollTop = (8-START_HOUR)*HOUR_PX; }, 100);
    }

    function renderEvents() {
        if (!calendarData || !calendarData.salle) return;
        calendarData.salle.forEach(function(ev) {
            if (!ev.start) return;
            const start = new Date(ev.start), end = new Date(ev.end||ev.start);
            const diffDays = Math.round((start - currentMonday)/(1000*60*60*24));
            if (diffDays < 0 || diffDays >= 5) return;
            const col = document.getElementById('dayCol'+diffDays);
            if (!col) return;

            const sH=start.getUTCHours()+1, sM=start.getUTCMinutes(), eH=end.getUTCHours()+1, eM=end.getUTCMinutes();
            const startMin=sH*60+sM, endMin=eH*60+eM;
            const topPx = (startMin-START_HOUR*60)*(HOUR_PX/60);
            const heightPx = Math.max((endMin-startMin)*(HOUR_PX/60), 26);
            if (topPx < 0) return;

            const color = getEventColor(ev.subject||'');
            const timeStr = String(sH).padStart(2,'0')+':'+String(sM).padStart(2,'0')+' - '+String(eH).padStart(2,'0')+':'+String(eM).padStart(2,'0');
            const durStr = getDuration(startMin, endMin);

            const el = document.createElement('div');
            el.className = 'event color-'+color;
            el.style.top = topPx+'px'; el.style.height = heightPx+'px';

            let inner = '<div class="event-handle top"></div><div class="event-inner">';
            inner += '<div class="event-title">'+escHtml(ev.subject||'')+'</div>';
            if (heightPx > 32) inner += '<div class="event-time">'+timeStr+'</div>';
            if (heightPx > 50 && ev.organizer) inner += '<div class="event-org">'+escHtml(ev.organizer)+'</div>';
            inner += '</div>';
            if (heightPx > 40) inner += '<div class="event-badge">'+durStr+'</div>';
            inner += '<div class="event-handle bottom"></div>';
            el.innerHTML = inner;

            el.addEventListener('mouseenter', function(e) {
                const tt = document.getElementById('tooltip');
                tt.innerHTML = '<div class="tt-title">'+escHtml(ev.subject||'')+'</div>'+
                    '<div class="tt-row">Horaire : <span>'+timeStr+'</span></div>'+
                    '<div class="tt-row">Durée : <span>'+durStr+'</span></div>'+
                    (ev.organizer?'<div class="tt-row">Organisateur : <span>'+escHtml(ev.organizer)+'</span></div>':'')+
                    (ev.location?'<div class="tt-row">Lieu : <span>'+escHtml(ev.location)+'</span></div>':'');
                tt.style.left = Math.min(e.clientX+12, window.innerWidth-300)+'px';
                tt.style.top = (e.clientY-10)+'px';
                tt.classList.add('visible');
            });
            el.addEventListener('mousemove', function(e) {
                const tt = document.getElementById('tooltip');
                tt.style.left = Math.min(e.clientX+12, window.innerWidth-300)+'px';
                tt.style.top = (e.clientY-10)+'px';
            });
            el.addEventListener('mouseleave', function() { document.getElementById('tooltip').classList.remove('visible'); });
            col.appendChild(el);
        });
    }

    function getEventColor(subject) {
        const s = subject.toLowerCase();
        if (s.includes('prépa') || s.includes('prepa')) return 'red';
        if (s.includes('contact')) return 'blue';
        if (s.includes('morning')) return 'green';
        if (s.includes('chart') || s.includes('solutions')) return 'purple';
        if (s.includes('webinaire') || s.includes('conférence')) return 'orange';
        if (s.includes('absent') || s.includes('annul')) return 'yellow';
        return 'default';
    }

    async function loadCalendarData() {
        const dot = document.getElementById('syncDot'), label = document.getElementById('syncLabel');
        dot.className = 'sync-dot loading'; label.textContent = 'Sync...';
        try {
            const resp = await fetch(GH_API, { headers: { 'Authorization': 'token '+GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }, cache: 'no-store' });
            if (!resp.ok) throw new Error('HTTP '+resp.status);
            const data = await resp.json();
            calendarData = JSON.parse(atob(data.content));
            dot.className = 'sync-dot';
            const u = calendarData.updatedAt ? new Date(calendarData.updatedAt) : null;
            label.textContent = u ? u.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : 'OK';
            clearEvents(); renderEvents();
        } catch(err) { console.error(err); dot.className='sync-dot error'; label.textContent='Erreur'; }
    }
    function clearEvents() { document.querySelectorAll('.event').forEach(function(e){e.remove();}); }

    renderAgenda(); loadCalendarData();
    setInterval(loadCalendarData, 5*60*1000);
    setInterval(function() { document.querySelectorAll('.now-line').forEach(function(e){e.remove();}); renderAgenda(); }, 60000);
</script>
</body>
</html>
