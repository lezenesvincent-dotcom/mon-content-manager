<!DOCTYPE html>
<!-- BUILD: 2026-02-15 13:04:02 -->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Studio - Studio CIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0e1a;
            color: #e4e4e4;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ===== FOND POCHETTES ALBUM ===== */
        .album-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0; overflow: hidden;
        }
        .album-bg .cover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(60px) saturate(2.5) brightness(0.7);
            transition: opacity 2s ease-in-out; opacity: 0;
            transform: scale(1.4);
        }
        .album-bg .cover.active { opacity: 1; }
        .album-bg::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.1); z-index: 1;
        }

        .page-wrap {
            position: relative; z-index: 2; height: 100vh;
            display: flex; flex-direction: column; padding: 14px 24px 18px;
        }

        .nav-back {
            position: fixed; top: 12px; left: 16px; z-index: 100;
            color: #c8b4ff; text-decoration: none; font-size: 12px;
            background: rgba(100,80,200,0.15); padding: 5px 14px; border-radius: 16px;
            border: 1px solid rgba(100,80,200,0.2); backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .nav-back:hover { background: rgba(100,80,200,0.3); }

        /* HEADER */
        .agenda-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 4px 12px; margin-top: 2px;
        }
        .agenda-title h1 { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.85); }
        .agenda-title .salle-name { font-size: 10px; color: rgba(255,255,255,0.3); }
        .agenda-nav { display: flex; align-items: center; gap: 6px; }
        .agenda-nav button {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.6); padding: 5px 12px; border-radius: 8px;
            cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.15s;
        }
        .agenda-nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .agenda-nav .week-label { color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; min-width: 200px; text-align: center; }
        .sync-info { font-size: 10px; color: rgba(255,255,255,0.25); display: flex; align-items: center; gap: 5px; }
        .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; display: inline-block; }
        .sync-dot.loading { background: #fbbf24; }
        .sync-dot.error { background: #f87171; }

        /* ===== CADRE PRINCIPAL ===== */
        .agenda-body {
            flex: 1; display: flex; overflow: hidden;
            border-radius: 20px;
            background: linear-gradient(180deg, rgba(180,180,190,0.12) 0%, rgba(120,120,140,0.06) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 2px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .time-col { width: 44px; min-width: 44px; padding-top: 52px; overflow: hidden; }
        .time-label {
            height: 60px; display: flex; align-items: flex-start; justify-content: flex-end;
            font-size: 10px; color: rgba(255,255,255,0.25); padding-right: 6px;
            transform: translateY(-7px); font-weight: 500;
        }

        .days-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; }

        /* ===== HEADER JOURS - barre arrondie ===== */
        .days-header {
            display: grid; grid-template-columns: repeat(5, 1fr);
            position: sticky; top: 0; z-index: 10; gap: 6px; padding: 6px 6px 0;
        }
        .days-header-bar {
            grid-column: 1 / -1;
            background: linear-gradient(180deg, rgba(160,160,175,0.15) 0%, rgba(120,120,140,0.08) 100%);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            display: grid; grid-template-columns: repeat(5, 1fr);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .day-header {
            text-align: center; padding: 10px 4px 8px;
        }
        .day-header .day-name {
            font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 700; text-transform: capitalize;
            display: inline;
        }
        .day-header .day-num {
            font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.85); display: inline; margin-left: 6px;
        }
        .day-header.today .day-num {
            background: linear-gradient(135deg, #f59e0b, #f97316); color: #fff;
            border-radius: 50%; width: 34px; height: 34px;
            display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
            vertical-align: middle;
            box-shadow: 0 0 12px rgba(245,158,11,0.4);
        }

        .day-col.today-col {
            border: 2px solid rgba(255,180,50,0.6);
            box-shadow: inset 0 0 20px rgba(255,180,50,0.08),
                        0 0 15px rgba(255,180,50,0.15),
                        0 0 30px rgba(255,160,30,0.08);
            background: linear-gradient(180deg,
                rgba(255,180,50,0.06) 0%,
                rgba(255,160,30,0.02) 50%,
                rgba(255,180,50,0.05) 100%);
        }
        .days-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            position: relative; gap: 6px; padding: 6px;
        }
        .day-col {
            position: relative; min-height: calc(14 * 60px);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(180deg,
                rgba(100,100,120,0.08) 0%,
                rgba(80,80,100,0.04) 50%,
                rgba(140,140,160,0.1) 100%);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03),
                        inset 0 -2px 8px rgba(255,255,255,0.02),
                        0 1px 4px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .hour-line { height: 60px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* NOW LINE */
        .now-line {
            position: absolute; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #818cf8, #6366f1); z-index: 5;
            box-shadow: 0 0 8px rgba(99,102,241,0.5);
        }
        .now-line::before {
            content: ''; position: absolute; left: -3px; top: -3px;
            width: 8px; height: 8px; border-radius: 50%; background: #818cf8;
        }

        /* ===== ÉVÉNEMENTS ===== */
        .event {
            position: absolute; left: 4px; right: 4px;
            border-radius: 12px;
            overflow: hidden; cursor: grab; z-index: 3;
            transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 28px;
        }
        .event.fixed-picto {
            border: none; border-radius: 0;
            background: none !important;
            overflow: visible;
        }
        .event.fixed-picto .event-overlay { display: none; }
        .event.fixed-picto .event-handle { display: none; }
        .event.fixed-picto .event-inner { display: none; }
        .event.fixed-picto .event-badge { display: none; }
        .event.fixed-picto .picto-wrap {
            position: relative; display: block; width: 100%; overflow: hidden; border-radius: 10px;
        }
        .event.fixed-picto .picto-wrap img {
            width: 100%; height: auto; display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }
        .event.fixed-picto .picto-time {
            position: absolute; bottom: 0; left: 0; right: 0;
            font-size: 11px; font-weight: 700; color: #fff;
            text-align: center;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.45);
            padding: 3px 0;
        }

        .event:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 6; border-color: rgba(255,255,255,0.2);
        }
        .event:active { cursor: grabbing; }

        .event-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0; overflow: hidden;
        }
        .event-bg img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center; display: block;
        }

        .event-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }
        .event.no-image .event-overlay { background: none; }
        .event.no-image {
            background: linear-gradient(135deg, rgba(80,90,140,0.4), rgba(50,60,110,0.25));
        }

        .event-inner {
            position: relative; z-index: 2;
            padding: 6px 8px; height: 100%;
            display: flex; flex-direction: column;
        }
        .event-title {
            font-weight: 800; color: #fff; font-size: 11px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .event-time {
            font-size: 9px; color: rgba(255,255,255,0.7); margin-top: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .event-org {
            font-size: 9px; color: rgba(255,255,255,0.5); margin-top: auto;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .event-badge {
            position: absolute; bottom: 8px; right: 8px; z-index: 3;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.85); font-size: 9px; font-weight: 700;
            padding: 3px 9px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .event-handle {
            position: absolute; left: 50%; transform: translateX(-50%);
            z-index: 4; cursor: ns-resize;
            opacity: 0; transition: opacity 0.15s;
            width: 32px; height: 8px;
        }
        .event-handle img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }
        .event:hover .event-handle { opacity: 0.8; }
        .event-handle.top { top: 3px; }
        .event-handle.bottom { bottom: 3px; }

        .event.dragging { z-index: 50; outline: 2px solid rgba(99,102,241,0.8); outline-offset: 2px; }

        /* Popup confirmation */
        .confirm-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,22,40,0.95); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px; padding: 20px 28px; z-index: 300;
            backdrop-filter: blur(20px); box-shadow: 0 16px 48px rgba(0,0,0,0.6);
            text-align: center; min-width: 280px;
        }
        .confirm-popup.visible { display: block; }
        .confirm-popup h3 { color: #fff; font-size: 15px; font-weight: 700; margin-bottom: 8px; }
        .confirm-popup p { color: rgba(255,255,255,0.5); font-size: 12px; margin-bottom: 16px; }
        .confirm-popup .btn-row { display: flex; gap: 10px; justify-content: center; }
        .confirm-popup button {
            padding: 8px 20px; border-radius: 10px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .confirm-popup .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
        .confirm-popup .btn-confirm { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
        .confirm-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 250;
        }

        /* Category picker popup */
        .catpicker-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 400;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        .catpicker-overlay.visible { display: block; }
        .catpicker {
            display: none; position: fixed;
            background: rgba(18,20,38,0.85);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 24px;
            z-index: 450; min-width: 340px; max-width: 420px;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden;
        }
        .catpicker::before {
            content: ''; position: absolute; top: -40%; right: -30%; width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
            pointer-events: none;
        }
        .catpicker::after {
            content: ''; position: absolute; bottom: -30%; left: -20%; width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(236,72,153,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        .catpicker.visible { display: block; animation: catpickerIn 0.25s ease-out; }
        @keyframes catpickerIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .catpicker h4 {
            color: rgba(255,255,255,0.5); font-size: 13px; text-transform: uppercase;
            letter-spacing: 1.5px; margin: 0 0 16px 2px; position: relative; z-index: 1;
        }
        .catpicker-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; position: relative; z-index: 1;
        }
        .catpicker-item {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; padding: 10px 6px; border-radius: 14px;
            transition: background 0.15s;
        }
        .catpicker-item:hover { background: rgba(255,255,255,0.08); }
        .catpicker-item img {
            width: 90px; height: 60px; object-fit: contain; border-radius: 12px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }
        .catpicker-item span {
            font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 600;
        }
        .catpicker-author {
            padding: 14px 18px; color: #fff; font-size: 15px; font-weight: 500;
            border-radius: 12px; cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .catpicker-author:last-child { border-bottom: none; }
        .catpicker-author:hover { background: rgba(99,102,241,0.25); }

        /* Allday event mode */
        .event.allday-picto {
            position: absolute; right: 4px;
            left: auto !important;
            width: 48% !important;
            border: none; border-radius: 14px;
            background: none !important;
            overflow: hidden;
        }
        .event.allday-picto .allday-bg {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        }
        .event.allday-picto .allday-bg img {
            width: 100%; height: 100%; object-fit: contain; object-position: bottom right;
            display: block; border-radius: 14px;
        }
        .event.allday-picto .allday-title {
            position: absolute; bottom: 60px; right: 8px;
            font-size: 12px; font-weight: 800; color: #fff;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            text-align: right; line-height: 1.15;
        }
        .event.allday-picto .allday-badge {
            position: absolute; bottom: 10px; right: 10px;
        }

        /* Input dialog */
        .input-dialog-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 500;
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
        }
        .input-dialog-overlay.visible { display: flex; align-items: center; justify-content: center; }
        .input-dialog {
            background: rgba(18,20,38,0.92);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 28px 32px;
            min-width: 360px; max-width: 440px;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden; position: relative;
        }
        .input-dialog::before {
            content: ''; position: absolute; top: -30%; right: -20%; width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(99,102,241,0.2) 0%, transparent 70%);
            pointer-events: none;
        }
        .input-dialog h4 {
            color: rgba(255,255,255,0.5); font-size: 13px; text-transform: uppercase;
            letter-spacing: 1.5px; margin: 0 0 20px 0;
        }
        .input-dialog .field-group {
            margin-bottom: 16px;
        }
        .input-dialog .field-label {
            font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
        }
        .input-dialog input[type="text"],
        .input-dialog input[type="time"] {
            width: 100%; box-sizing: border-box;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 12px 16px;
            color: #fff; font-size: 16px; font-family: inherit; font-weight: 500;
            outline: none; transition: border-color 0.2s;
            caret-color: #818cf8;
        }
        .input-dialog input:focus {
            border-color: rgba(99,102,241,0.6);
            background: rgba(255,255,255,0.08);
        }
        .input-dialog input::placeholder { color: rgba(255,255,255,0.2); }
        .input-dialog .dialog-buttons {
            display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
        }
        .input-dialog .dialog-buttons button {
            padding: 10px 24px; border-radius: 12px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
        }
        .input-dialog .btn-cancel { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
        .input-dialog .btn-confirm { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
        .input-dialog .btn-delete { background: rgba(220,38,38,0.8); color: #fff; }
        }
        .confirm-overlay.visible { display: block; }

        /* Tooltip */
        .event-tooltip {
            display: none; position: fixed;
            background: rgba(20,22,40,0.95); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px 18px; font-size: 13px; color: #fff;
            z-index: 100; max-width: 280px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
        }
        .event-tooltip.visible { display: block; }
        .event-tooltip .tt-title { font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .event-tooltip .tt-row { color: rgba(255,255,255,0.45); font-size: 11px; margin: 4px 0; }
        .event-tooltip .tt-row span { color: rgba(255,255,255,0.85); }

        .days-scroll::-webkit-scrollbar { width: 4px; }
        .days-scroll::-webkit-scrollbar-track { background: transparent; }
        .days-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="album-bg" id="albumBg"></div>
    <a href="index.html" class="nav-back">&larr; Studio Manager</a>
    <div class="page-wrap">
        <div class="agenda-header">
            <div class="agenda-title">
                <div>
                    <h1>Agenda Studio</h1>
                    <span class="salle-name">SALLE VICTORIEN2 &bull; D2 N3 STUDIO</span>
                </div>
            </div>
            <div class="agenda-nav">
                <button onclick="changeWeek(-1)">&larr;</button>
                <span class="week-label" id="weekLabel"></span>
                <button onclick="changeWeek(1)">&rarr;</button>
                <button onclick="goToday()" style="margin-left:6px;color:#818cf8;font-weight:600;">Aujourd'hui</button>
            </div>
            <div class="sync-info">
                <span class="sync-dot" id="syncDot"></span>
                <span id="syncLabel">Chargement...</span>
            </div>
        </div>
        <div class="agenda-body">
            <div class="time-col" id="timeCol"></div>
            <div class="days-scroll" id="daysScroll">
                <div class="days-header" id="daysHeader"></div>
                <div class="days-grid" id="daysGrid"></div>
            </div>
        </div>
    </div>
    <div class="event-tooltip" id="tooltip"></div>
    <div class="confirm-overlay" id="confirmOverlay"></div>
    <div class="confirm-popup" id="confirmPopup">
        <h3 id="confirmTitle">Déplacer l'événement ?</h3>
        <p id="confirmDesc"></p>
        <div class="btn-row">
            <button class="btn-cancel" onclick="cancelDrag()">Annuler</button>
            <button class="btn-confirm" onclick="confirmDrag()">Confirmer</button>
        </div>
    </div>

    <!-- Category picker -->
    <div class="catpicker-overlay" id="catpickerOverlay" onclick="closeCatPicker()"></div>
    <div class="catpicker" id="catpicker">
        <h4 id="catpickerTitle">New</h4>
        <div class="catpicker-grid" id="catpickerGrid"></div>
    </div>

    <!-- Input dialog for title + time -->
    <div class="input-dialog-overlay" id="inputDialogOverlay">
        <div class="input-dialog">
            <h4 id="inputDialogTitle">Détails</h4>
            <div class="field-group">
                <div class="field-label">Titre</div>
                <input type="text" id="inputTitle" placeholder="Nom de l'événement..." autocomplete="off">
            </div>
            <div class="field-group">
                <div class="field-label">Heure de direct</div>
                <input type="time" id="inputTime" value="09:00">
            </div>
            <div class="dialog-buttons">
                <button class="btn-delete" id="btnDelete" onclick="deleteEvent()" style="display:none">Supprimer</button>
                <div style="flex:1"></div>
                <button class="btn-cancel" onclick="cancelInputDialog()">Annuler</button>
                <button class="btn-confirm" onclick="confirmInputDialog()">Créer</button>
            </div>
        </div>
    </div>

<script>
    const GH_TOKEN = ['s6Q6VG_phg','71QRNKGR8m','EiaK9FWAqE','cWTym0zJLw'].map(s=>s.split('').reverse().join('')).join('');
    const GH_REPO = 'lezenesvincent-dotcom/mon-content-manager';
    const GH_FILE = 'calendar-data.json';
    const GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/' + GH_FILE;
    const IMG_BASE = 'agenda-assets/';
    const START_HOUR = 7, END_HOUR = 21, HOUR_PX = 60;
    const JOURS_FULL = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];

    const EVENT_IMAGES = {
        morning: { src: IMG_BASE + 'picto-morning.png', mode: 'fixed', height: 55 },
        'conf call': { src: IMG_BASE + 'picto-confcall.png', mode: 'fixed', height: 45 },
        'conference call': { src: IMG_BASE + 'picto-confcall.png', mode: 'fixed', height: 45 },
        'conf hebdo': { src: IMG_BASE + 'picto-confcall.png', mode: 'fixed', height: 45 },
        'décryptage': { src: IMG_BASE + 'picto-decryptage.png', mini: IMG_BASE + 'picto-decryptage-mini.png', mode: 'fixed', height: 45 },
        'decryptage': { src: IMG_BASE + 'picto-decryptage.png', mini: IMG_BASE + 'picto-decryptage-mini.png', mode: 'fixed', height: 45 },
        'direct analyste': { src: IMG_BASE + 'picto-da.png', mini: IMG_BASE + 'picto-da-mini.png', mode: 'fixed', height: 45 },
        'direct expert': { src: IMG_BASE + 'picto-da.png', mini: IMG_BASE + 'picto-da-mini.png', mode: 'fixed', height: 45 },
        'da ': { src: IMG_BASE + 'picto-da.png', mini: IMG_BASE + 'picto-da-mini.png', mode: 'fixed', height: 45 },
        'shooting': { src: IMG_BASE + 'picto-morning.png', mode: 'fixed', height: 55 },
        'absent': { src: IMG_BASE + 'picto-absent.png', mode: 'allday' },
        'call': { src: IMG_BASE + 'picto-call.png', mini: IMG_BASE + 'picto-call-mini.png', mode: 'fixed', height: 45 },
    };

    let currentMonday = getMonday(new Date());
    let calendarData = null;
    var localEvents = [];

    function getMonday(d) {
        const date = new Date(d); const day = date.getDay();
        return new Date(date.setDate(date.getDate() - day + (day === 0 ? -6 : 1)));
    }
    function changeWeek(dir) { currentMonday.setDate(currentMonday.getDate() + dir * 7); renderAgenda(); loadCalendarData(); }
    function goToday() { currentMonday = getMonday(new Date()); renderAgenda(); loadCalendarData(); }
    function getWeekNumber(d) {
        const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
        date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
        return Math.ceil((((date - new Date(Date.UTC(date.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
    }
    function getDuration(startMin, endMin) {
        const dur = endMin - startMin;
        if (dur >= 60) { const h = Math.floor(dur/60), m = dur%60; return m > 0 ? h+'h'+String(m).padStart(2,'0') : h+' heure'+(h>1?'s':''); }
        return dur + ' min';
    }
    function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fixEnc(str) {
        if (!str) return str;
        try { return decodeURIComponent(escape(str)); } catch(e) { return str; }
    }
    function getEventImage(subject) {
        const s = (subject || '').toLowerCase();
        for (const [keyword, imgObj] of Object.entries(EVENT_IMAGES)) {
            if (s.includes(keyword)) return imgObj;
        }
        return null;
    }

    function renderAgenda() {
        const today = new Date();
        const endWeek = new Date(currentMonday); endWeek.setDate(endWeek.getDate() + 4);
        const mois = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];
        document.getElementById('weekLabel').textContent =
            currentMonday.getDate()+' '+mois[currentMonday.getMonth()]+' — '+endWeek.getDate()+' '+mois[endWeek.getMonth()]+'  ·  S'+getWeekNumber(currentMonday);

        var th = '';
        for (var h = START_HOUR; h <= END_HOUR; h++) th += '<div class="time-label">'+String(h).padStart(2,'0')+':00</div>';
        document.getElementById('timeCol').innerHTML = '<div style="height:52px;"></div>' + th;

        // Header jours dans une barre arrondie
        var hh = '<div class="days-header-bar">';
        for (var i = 0; i < 5; i++) {
            var d = new Date(currentMonday); d.setDate(d.getDate()+i);
            hh += '<div class="day-header '+(d.toDateString()===today.toDateString()?'today':'')+'">'+
                '<div class="day-name">'+JOURS_FULL[i]+'</div><div class="day-num">'+d.getDate()+'</div></div>';
        }
        hh += '</div>';
        document.getElementById('daysHeader').innerHTML = hh;

        var gh = '';
        var todayDayIdx = (getMonday(today).toDateString() === currentMonday.toDateString()) ? today.getDay() - 1 : -1;
        for (var i = 0; i < 5; i++) {
            gh += '<div class="day-col'+(i === todayDayIdx ? ' today-col' : '')+'" id="dayCol'+i+'">';
            for (var h = START_HOUR; h < END_HOUR; h++) gh += '<div class="hour-line"></div>';
            gh += '</div>';
        }
        document.getElementById('daysGrid').innerHTML = gh;

        // Now line
        var dayIdx = today.getDay()-1;
        if (dayIdx >= 0 && dayIdx < 5 && getMonday(today).toDateString() === currentMonday.toDateString()) {
            var topPx = (today.getHours()*60+today.getMinutes()-START_HOUR*60)*(HOUR_PX/60);
            if (topPx > 0) {
                var col = document.getElementById('dayCol'+dayIdx);
                if (col) { var l = document.createElement('div'); l.className='now-line'; l.style.top=topPx+'px'; col.appendChild(l); }
            }
        }
        renderEvents();
        setTimeout(function(){ document.getElementById('daysScroll').scrollTop = (8-START_HOUR)*HOUR_PX; }, 100);
    }

    function renderEvents() {
        if (!calendarData || !calendarData.salle) return;

        // Re-inject local events
        localEvents.forEach(function(le) {
            var exists = calendarData.salle.some(function(e) { return e._localId === le._localId; });
            if (!exists) calendarData.salle.push(le);
        });

        var dayEvents = {};
        calendarData.salle.forEach(function(ev) {
            if (!ev.start) return;
            ev.subject = fixEnc(ev.subject);
            ev.location = fixEnc(ev.location);
            ev.organizer = fixEnc(ev.organizer);
            var start = new Date(ev.start);
            // Utiliser les dates locales pour éviter le décalage UTC/Paris
            var startLocal = new Date(start.getFullYear(), start.getMonth(), start.getDate());
            var mondayLocal = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate());
            var diffDays = Math.round((startLocal - mondayLocal)/(1000*60*60*24));
            if (diffDays < 0 || diffDays >= 5) return;
            if (!dayEvents[diffDays]) dayEvents[diffDays] = [];
            dayEvents[diffDays].push(ev);
        });

        Object.keys(dayEvents).forEach(function(dayIdx) {
            var evts = dayEvents[dayIdx];
            var col = document.getElementById('dayCol'+dayIdx);
            if (!col) return;

            // Fusionner prépa + event suivant
            var toSkip = {};
            for (var i = 0; i < evts.length; i++) {
                var subI = (evts[i].subject || '').toLowerCase();
                if (subI.includes('prépa') || subI.includes('prepa') || subI.includes('préparation') || subI.includes('preparation')) {
                    var prepaEnd = new Date(evts[i].end || evts[i].start);
                    for (var j = 0; j < evts.length; j++) {
                        if (i === j) continue;
                        var confStart = new Date(evts[j].start);
                        if (Math.abs(prepaEnd - confStart) < 5 * 60 * 1000) {
                            evts[i].end = evts[j].end;
                            evts[i].subject = evts[j].subject;
                            evts[i]._merged = true;
                            toSkip[j] = true;
                            break;
                        }
                    }
                }
            }
            evts = evts.filter(function(_, idx) { return !toSkip[idx]; });

            // Chevauchement - algorithme robuste
            var items = [];
            evts.forEach(function(ev) {
                var start = new Date(ev.start), end = new Date(ev.end||ev.start);
                var sH=start.getUTCHours()+1, sM=start.getUTCMinutes(), eH=end.getUTCHours()+1, eM=end.getUTCMinutes();
                var startMin=sH*60+sM, endMin=eH*60+eM;
                if (endMin <= startMin) endMin = startMin + 30;
                items.push({ ev: ev, startMin: startMin, endMin: endMin, col: 0, totalCols: 1 });
            });

            // Trier par heure de début puis par durée (plus long d'abord)
            items.sort(function(a, b) {
                if (a.startMin !== b.startMin) return a.startMin - b.startMin;
                return (b.endMin - b.startMin) - (a.endMin - a.startMin);
            });

            // Assigner les colonnes
            for (var i = 0; i < items.length; i++) {
                var usedCols = [];
                for (var j = 0; j < i; j++) {
                    if (items[j].startMin < items[i].endMin && items[j].endMin > items[i].startMin) {
                        usedCols.push(items[j].col);
                    }
                }
                var assignCol = 0;
                while (usedCols.indexOf(assignCol) !== -1) assignCol++;
                items[i].col = assignCol;
            }

            // Calculer totalCols pour chaque groupe d'overlap
            for (var i = 0; i < items.length; i++) {
                var groupMax = items[i].col;
                for (var j = 0; j < items.length; j++) {
                    if (i === j) continue;
                    if (items[i].startMin < items[j].endMin && items[i].endMin > items[j].startMin) {
                        if (items[j].col > groupMax) groupMax = items[j].col;
                    }
                }
                items[i].totalCols = groupMax + 1;
            }

            // Synchroniser totalCols dans chaque cluster
            var changed = true;
            while (changed) {
                changed = false;
                for (var i = 0; i < items.length; i++) {
                    for (var j = 0; j < items.length; j++) {
                        if (i === j) continue;
                        if (items[i].startMin < items[j].endMin && items[i].endMin > items[j].startMin) {
                            var maxTC = Math.max(items[i].totalCols, items[j].totalCols);
                            if (items[i].totalCols !== maxTC || items[j].totalCols !== maxTC) {
                                items[i].totalCols = maxTC;
                                items[j].totalCols = maxTC;
                                changed = true;
                            }
                        }
                    }
                }
            }

            // Render
            items.forEach(function(item) {
                var ev = item.ev;
                var topPx = (item.startMin-START_HOUR*60)*(HOUR_PX/60);
                var heightPx = Math.max((item.endMin-item.startMin)*(HOUR_PX/60), 28);
                if (topPx < 0) return;

                var totalCols = item.totalCols;
                var widthPct = 100 / totalCols;
                var leftPct = item.col * widthPct;

                var timeStr = String(Math.floor(item.startMin/60)).padStart(2,'0')+':'+String(item.startMin%60).padStart(2,'0')+
                    ' - '+String(Math.floor(item.endMin/60)).padStart(2,'0')+':'+String(item.endMin%60).padStart(2,'0');
                var durStr = getDuration(item.startMin, item.endMin);
                var eventImg = getEventImage(ev.subject);
                var isFixed = eventImg && eventImg.mode === 'fixed';
                var isAllday = eventImg && eventImg.mode === 'allday';

                var el = document.createElement('div');
                el.className = 'event' + (isFixed ? ' fixed-picto' : (isAllday ? ' allday-picto' : (eventImg ? '' : ' no-image')));
                el.style.top = topPx+'px';
                if (!isFixed) el.style.height = heightPx+'px';
                if (totalCols > 1) {
                    el.style.left = 'calc('+leftPct+'% + 2px)';
                    el.style.right = 'auto';
                    el.style.width = 'calc('+widthPct+'% - 4px)';
                }

                var html = '';
                if (isAllday) {
                    // Split subject into words for line breaks
                    var words = (ev.subject||'').split(' ');
                    var titleHtml = words.map(function(w) { return escHtml(w); }).join('<br>');
                    html += '<div class="allday-bg"><img src="'+eventImg.src+'" alt=""></div>';
                    html += '<div class="allday-title">'+titleHtml+'</div>';
                    html += '<div class="allday-badge"><div class="event-badge" style="position:static;display:inline-block;">'+durStr+'</div></div>';
                } else if (isFixed) {
                    var pictoSrc = (totalCols > 1 && eventImg.mini) ? eventImg.mini : eventImg.src;
                    html += '<div class="picto-wrap">';
                    html += '<img src="'+pictoSrc+'" alt="">';
                    html += '<div class="picto-time">'+timeStr+'</div>';
                    html += '</div>';
                } else {
                    if (eventImg) {
                        html += '<div class="event-bg"><img src="'+eventImg.src+'" alt=""></div>';
                    }
                    html += '<div class="event-overlay"></div>';
                    html += '<div class="event-handle top"><img src="'+IMG_BASE+'poignee.png" alt=""></div>';
                    html += '<div class="event-inner">';
                    html += '<div class="event-title">'+escHtml(ev.subject||'')+'</div>';
                    if (heightPx > 34) html += '<div class="event-time">'+timeStr+'</div>';
                    if (heightPx > 55 && ev.organizer) html += '<div class="event-org">'+escHtml(ev.organizer)+'</div>';
                    html += '</div>';
                    if (heightPx > 42) html += '<div class="event-badge">'+durStr+'</div>';
                    html += '<div class="event-handle bottom"><img src="'+IMG_BASE+'poignee.png" alt=""></div>';
                }
                el.innerHTML = html;

                el.addEventListener('mouseenter', function(e) {
                    var tt = document.getElementById('tooltip');
                    tt.innerHTML = '<div class="tt-title">'+escHtml(ev.subject||'')+'</div>'+
                        '<div class="tt-row">Horaire : <span>'+timeStr+'</span></div>'+
                        '<div class="tt-row">Durée : <span>'+durStr+'</span></div>'+
                        (ev.organizer?'<div class="tt-row">Organisateur : <span>'+escHtml(ev.organizer)+'</span></div>':'')+
                        (ev.location?'<div class="tt-row">Lieu : <span>'+escHtml(ev.location)+'</span></div>':'');
                    tt.style.left = Math.min(e.clientX+12, window.innerWidth-300)+'px';
                    tt.style.top = (e.clientY-10)+'px';
                    tt.classList.add('visible');
                });
                el.addEventListener('mousemove', function(e) {
                    var tt = document.getElementById('tooltip');
                    tt.style.left = Math.min(e.clientX+12, window.innerWidth-300)+'px';
                    tt.style.top = (e.clientY-10)+'px';
                });
                el.addEventListener('mouseleave', function() { document.getElementById('tooltip').classList.remove('visible'); });

                el._evData = { subject: ev.subject, startMin: item.startMin, endMin: item.endMin, ev: ev };
                el.addEventListener('click', function(e) {
                    if (dragState) return; // don't re-select during drag
                    e.stopPropagation();
                    selectEvent(el, ev);
                });
                el.addEventListener('dblclick', function(e) {
                    e.stopPropagation();
                    if (dragState) cancelDrag();
                    editEvent(ev, item);
                });

                col.appendChild(el);
            });
        });
    }

    // ===== LOAD DATA =====
    async function loadCalendarData() {
        var dot = document.getElementById('syncDot'), label = document.getElementById('syncLabel');
        dot.className = 'sync-dot loading'; label.textContent = 'Sync...';
        try {
            var resp = await fetch(GH_API, { headers: { 'Authorization': 'token '+GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' }, cache: 'no-store' });
            if (!resp.ok) throw new Error('HTTP '+resp.status);
            var data = await resp.json();
            calendarData = JSON.parse(atob(data.content));
            dot.className = 'sync-dot';
            var u = calendarData.updatedAt ? new Date(calendarData.updatedAt) : null;
            label.textContent = u ? u.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : 'OK';
            clearEvents(); renderEvents();
        } catch(err) { console.error(err); dot.className='sync-dot error'; label.textContent='Erreur'; }
    }
    function clearEvents() { document.querySelectorAll('.event').forEach(function(e){e.remove();}); }

    // ===== DRAG & DROP (click-to-move) =====
    var dragState = null;
    var dragGhost = null;

    function selectEvent(el, ev) {
        if (dragState) { cancelDrag(); return; }
        var evData = el._evData; if (!evData) return;
        document.getElementById('tooltip').classList.remove('visible');
        dragState = { el:el, evData:evData,
            origTop:parseInt(el.style.top), origDayIdx:parseInt(el.parentElement.id.replace('dayCol','')),
            newDayIdx:parseInt(el.parentElement.id.replace('dayCol','')), newStartMin:evData.startMin };
        el.classList.add('dragging');
        dragGhost = el.cloneNode(true);
        dragGhost.style.position = 'fixed';
        dragGhost.style.width = el.offsetWidth + 'px';
        dragGhost.style.opacity = '0.75';
        dragGhost.style.pointerEvents = 'none';
        dragGhost.style.zIndex = '500';
        dragGhost.style.transition = 'none';
        dragGhost.style.left = '-9999px';
        dragGhost.classList.remove('dragging');
        document.body.appendChild(dragGhost);
    }

    document.addEventListener('mousemove', function(e) {
        if (!dragState || !dragGhost) return;
        dragGhost.style.left = (e.clientX - dragGhost.offsetWidth/2) + 'px';
        dragGhost.style.top = (e.clientY - 20) + 'px';
    });

    // Click on empty grid area = place event there
    document.getElementById('daysGrid').addEventListener('click', function(e) {
        if (!dragState) return;
        // Allow drop on any area including existing events
        var col = e.target.closest('.day-col');
        if (!col) return;
        e.stopPropagation();
        var newDayIdx = parseInt(col.id.replace('dayCol',''));
        var scroll = document.getElementById('daysScroll');
        var rect = col.getBoundingClientRect();
        var relY = e.clientY - rect.top;
        var newMin = START_HOUR*60 + Math.round(relY/HOUR_PX*60/15)*15;
        // Remove ghost
        if (dragGhost) { dragGhost.remove(); dragGhost = null; }
        dragState.el.classList.remove('dragging');
        dragState.newDayIdx = newDayIdx;
        dragState.newStartMin = newMin;
        // Show confirm
        var evData = dragState.evData;
        var nH=Math.floor(newMin/60), nM=newMin%60;
        var dur=evData.endMin-evData.startMin;
        var eH=Math.floor((newMin+dur)/60), eM=(newMin+dur)%60;
        var nd = new Date(currentMonday); nd.setDate(nd.getDate()+newDayIdx);
        document.getElementById('confirmTitle').textContent = 'D\u00e9placer "' + (evData.subject||'').substring(0,30) + '" ?';
        document.getElementById('confirmDesc').textContent =
            JOURS_FULL[newDayIdx]+' '+nd.getDate()+' \u2014 '+
            String(nH).padStart(2,'0')+':'+String(nM).padStart(2,'0')+' \u2192 '+
            String(eH).padStart(2,'0')+':'+String(eM).padStart(2,'0');
        document.getElementById('confirmOverlay').classList.add('visible');
        document.getElementById('confirmPopup').classList.add('visible');
    }, true);

    // ESC to cancel
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && dragState) cancelDrag(); });

    function confirmDrag() {
        if (dragState && dragState.evData) {
            var ev = dragState.evData.ev;
            var dur = dragState.evData.endMin - dragState.evData.startMin;
            var newStart = dragState.newStartMin;
            var newEnd = newStart + dur;
            var nd = new Date(currentMonday);
            nd.setDate(nd.getDate() + dragState.newDayIdx);
            var utcSH = Math.floor(newStart/60) - 1, utcSM = newStart % 60;
            var utcEH = Math.floor(newEnd/60) - 1, utcEM = newEnd % 60;
            ev.start = nd.toISOString().split('T')[0] + 'T' + String(utcSH).padStart(2,'0') + ':' + String(utcSM).padStart(2,'0') + ':00Z';
            ev.end = nd.toISOString().split('T')[0] + 'T' + String(utcEH).padStart(2,'0') + ':' + String(utcEM).padStart(2,'0') + ':00Z';
            if (ev._localId) {
                for (var li = 0; li < localEvents.length; li++) {
                    if (localEvents[li]._localId === ev._localId) {
                        localEvents[li].start = ev.start; localEvents[li].end = ev.end; break;
                    }
                }
            }
            clearEvents(); renderEvents();
        }
        document.getElementById('confirmOverlay').classList.remove('visible');
        document.getElementById('confirmPopup').classList.remove('visible');
        dragState=null;
    }
    function cancelDrag() {
        if (dragGhost) { dragGhost.remove(); dragGhost = null; }
        if (dragState && dragState.el) dragState.el.classList.remove('dragging');
        document.getElementById('confirmOverlay').classList.remove('visible');
        document.getElementById('confirmPopup').classList.remove('visible');
        dragState=null;
    }

    // ===== EDIT EVENT (double-click) =====
    var editState = null;
    function editEvent(ev, item) {
        editState = { ev: ev, item: item };
        var hStr = String(Math.floor(item.startMin/60)).padStart(2,'0') + ':' + String(item.startMin%60).padStart(2,'0');
        document.getElementById('inputDialogTitle').textContent = 'Modifier';
        document.getElementById('inputTitle').value = ev.subject || '';
        document.getElementById('inputTime').value = hStr;
        document.getElementById('btnDelete').style.display = 'inline-block';
        document.querySelector('.btn-confirm').textContent = 'Modifier';
        document.getElementById('inputDialogOverlay').classList.add('visible');
        setTimeout(function() { document.getElementById('inputTitle').focus(); document.getElementById('inputTitle').select(); }, 50);
    }

    function deleteEvent() {
        if (!editState) return;
        var ev = editState.ev;
        // Remove from calendarData.salle
        if (calendarData && calendarData.salle) {
            var idx = calendarData.salle.indexOf(ev);
            if (idx > -1) calendarData.salle.splice(idx, 1);
        }
        // Remove from localEvents
        if (ev._localId) {
            for (var li = 0; li < localEvents.length; li++) {
                if (localEvents[li]._localId === ev._localId) {
                    localEvents.splice(li, 1); break;
                }
            }
        }
        editState = null;
        document.getElementById('inputDialogOverlay').classList.remove('visible');
        clearEvents(); renderEvents();
    }

    // ===== FOND POCHETTES ALBUM =====
    var ALBUMS = [
        'https://i.scdn.co/image/ab67616d0000b273b1c4b76e23414c9f20f43b14',
        'https://i.scdn.co/image/ab67616d0000b2738b52c6b9bc4e43d873869699',
        'https://i.scdn.co/image/ab67616d0000b273e2e352d89826aef6dbd5ff8f',
        'https://i.scdn.co/image/ab67616d0000b2739e1cfc756886ac782e363d79',
        'https://i.scdn.co/image/ab67616d0000b27368384dd85fd5e95831252f60',
        'https://i.scdn.co/image/ab67616d0000b273879e9318cb9f4e05ee552ac9',
        'https://i.scdn.co/image/ab67616d0000b273b46f74097655d7f353caab14',
        'https://i.scdn.co/image/ab67616d0000b2730b51f8d91f3a21e8426361ae',
        'https://i.scdn.co/image/ab67616d0000b2734718e2b124f79258be7571c1',
        'https://i.scdn.co/image/ab67616d0000b27395f754318336a07e85ec59bc',
        'https://i.scdn.co/image/ab67616d0000b273d9985092cd88bffd97653b58',
        'https://i.scdn.co/image/ab67616d0000b2738940ac99f49e44f59e6f7fb3',
        'https://i.scdn.co/image/ab67616d0000b273ba5db46f4b838ef6027e6f96',
        'https://i.scdn.co/image/ab67616d0000b2734637341b9f507521afa9a778',
        'https://i.scdn.co/image/ab67616d0000b273e787cffec20aa2a396a61647',
    ];
    var currentAlbumIndex = 0;
    var bg = document.getElementById('albumBg');
    var layer1 = document.createElement('div');
    var layer2 = document.createElement('div');
    layer1.className = 'cover active'; layer2.className = 'cover';
    bg.appendChild(layer1); bg.appendChild(layer2);
    for (var i = ALBUMS.length-1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=ALBUMS[i]; ALBUMS[i]=ALBUMS[j]; ALBUMS[j]=t; }
    layer1.style.backgroundImage = 'url('+ALBUMS[0]+')';
    function nextAlbum() {
        currentAlbumIndex = (currentAlbumIndex+1)%ALBUMS.length;
        var al = layer1.classList.contains('active') ? layer1 : layer2;
        var nl = al===layer1 ? layer2 : layer1;
        nl.style.backgroundImage = 'url('+ALBUMS[currentAlbumIndex]+')';
        nl.classList.add('active'); al.classList.remove('active');
    }
    setInterval(nextAlbum, 30000);

    // ===== CATEGORY PICKER =====
    var CATEGORIES = [
        { id: 'call', label: 'Call', icon: IMG_BASE + 'picto-call-mini.png' },
        { id: 'da', label: 'DA', icon: IMG_BASE + 'picto-da-mini.png' },
        { id: 'shooting', label: 'Shooting', icon: IMG_BASE + 'picto-morning.png' },
    ];
    var AUTHORS = [
        'Christian Devismes', 'Alexandre Gerard', 'Laure Rufin',
        'Patrick Poussard', 'Eric Ravary'
    ];
    var catPickerState = { dayIdx: -1, hour: 0, minute: 0, category: null, step: 'category' };

    function initCatPicker() {
        renderCatPickerGrid();
    }

    function renderCatPickerGrid() {
        var grid = document.getElementById('catpickerGrid');
        var title = document.getElementById('catpickerTitle');
        grid.innerHTML = '';
        title.textContent = 'New';
        catPickerState.step = 'category';
        grid.style.gridTemplateColumns = 'repeat(3, 1fr)';
        CATEGORIES.forEach(function(cat) {
            var div = document.createElement('div');
            div.className = 'catpicker-item';
            div.innerHTML = '<img src="'+cat.icon+'" alt="'+cat.label+'"><span>'+cat.label+'</span>';
            div.onclick = function(e) { e.stopPropagation(); selectCategory(cat); };
            grid.appendChild(div);
        });
    }

    function renderAuthorList() {
        var grid = document.getElementById('catpickerGrid');
        var title = document.getElementById('catpickerTitle');
        grid.innerHTML = '';
        title.textContent = catPickerState.category.label;
        catPickerState.step = 'author';
        grid.style.gridTemplateColumns = '1fr';
        AUTHORS.forEach(function(author) {
            var div = document.createElement('div');
            div.className = 'catpicker-author';
            div.textContent = author;
            div.onclick = function(e) { e.stopPropagation(); selectAuthor(author); };
            grid.appendChild(div);
        });
    }

    function openCatPicker(e, dayIdx, hour, minute) {
        catPickerState = { dayIdx: dayIdx, hour: hour, minute: minute, category: null, step: 'category' };
        renderCatPickerGrid();
        var picker = document.getElementById('catpicker');
        var overlay = document.getElementById('catpickerOverlay');

        // Position near click
        var x = e.clientX, y = e.clientY;
        var pw = 380, ph = 320;
        if (x + pw > window.innerWidth) x = window.innerWidth - pw - 16;
        if (y + ph > window.innerHeight) y = y - ph;
        if (x < 10) x = 10;
        if (y < 10) y = 10;
        picker.style.left = x + 'px';
        picker.style.top = y + 'px';

        overlay.classList.add('visible');
        picker.classList.add('visible');
    }

    function closeCatPicker() {
        document.getElementById('catpickerOverlay').classList.remove('visible');
        document.getElementById('catpicker').classList.remove('visible');
    }

    function selectCategory(cat) {
        catPickerState.category = cat;
        renderAuthorList();
    }

    function selectAuthor(author) {
        catPickerState.author = author;
        closeCatPicker();
        // Open input dialog
        var s = catPickerState;
        var hStr = String(s.hour).padStart(2,'0') + ':' + String(s.minute).padStart(2,'0');
        document.getElementById('inputDialogTitle').textContent = s.category.label + ' — ' + author;
        document.getElementById('inputTitle').value = s.category.label + ' ' + author;
        document.getElementById('inputTime').value = hStr;
        document.getElementById('btnDelete').style.display = 'none';
        document.querySelector('.btn-confirm').textContent = 'Créer';
        editState = null;
        document.getElementById('inputDialogOverlay').classList.add('visible');
        setTimeout(function() { document.getElementById('inputTitle').focus(); document.getElementById('inputTitle').select(); }, 50);
    }

    function cancelInputDialog() {
        editState = null;
        document.getElementById('inputDialogOverlay').classList.remove('visible');
    }

    function confirmInputDialog() {
        var title = document.getElementById('inputTitle').value;
        var timeParts = document.getElementById('inputTime').value.split(':');
        var hour = parseInt(timeParts[0]) || 9;
        var minute = parseInt(timeParts[1]) || 0;

        if (editState) {
            // EDIT existing event
            var ev = editState.ev;
            ev.subject = title || ev.subject;
            var dur = editState.item.endMin - editState.item.startMin;
            var dayIdx = 0;
            // Find which day this event is on
            var evStart = new Date(ev.start);
            var startLocal = new Date(evStart.getFullYear(), evStart.getMonth(), evStart.getDate());
            var mondayLocal = new Date(currentMonday.getFullYear(), currentMonday.getMonth(), currentMonday.getDate());
            dayIdx = Math.round((startLocal - mondayLocal)/(1000*60*60*24));
            var dayDate = new Date(currentMonday);
            dayDate.setDate(dayDate.getDate() + dayIdx);
            var utcH = hour - 1, utcEH = Math.floor((hour*60+minute+dur)/60) - 1, utcEM = (hour*60+minute+dur)%60;
            ev.start = dayDate.toISOString().split('T')[0] + 'T' + String(utcH).padStart(2,'0') + ':' + String(minute).padStart(2,'0') + ':00Z';
            ev.end = dayDate.toISOString().split('T')[0] + 'T' + String(utcEH).padStart(2,'0') + ':' + String(utcEM).padStart(2,'0') + ':00Z';
            if (ev._localId) {
                for (var li = 0; li < localEvents.length; li++) {
                    if (localEvents[li]._localId === ev._localId) {
                        localEvents[li].subject = ev.subject;
                        localEvents[li].start = ev.start;
                        localEvents[li].end = ev.end;
                        break;
                    }
                }
            }
            editState = null;
            clearEvents(); renderEvents();
        } else {
            // CREATE new event
            var s = catPickerState;
            var dayDate = new Date(currentMonday);
            dayDate.setDate(dayDate.getDate() + s.dayIdx);
            var utcH = hour - 1;
            var utcEndH = hour;
            var startISO = dayDate.toISOString().split('T')[0] + 'T' + String(utcH).padStart(2,'0') + ':' + String(minute).padStart(2,'0') + ':00Z';
            var endISO = dayDate.toISOString().split('T')[0] + 'T' + String(utcEndH).padStart(2,'0') + ':' + String(minute).padStart(2,'0') + ':00Z';
            var newEvent = {
                subject: title || (s.category.label + ' ' + s.author),
                start: startISO,
                end: endISO,
                location: 'Studio CIC',
                organizer: s.author,
                status: 'Busy',
                _localId: 'local_' + Date.now()
            };
            localEvents.push(newEvent);
            if (calendarData && calendarData.salle) {
                calendarData.salle.push(newEvent);
                clearEvents(); renderEvents();
            }
        }

        document.getElementById('inputDialogOverlay').classList.remove('visible');
    }
    // Enter key confirms dialog
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.getElementById('inputDialogOverlay').classList.contains('visible')) {
            confirmInputDialog();
        }
    });

    // Attach click on empty areas via event delegation on daysScroll
    function attachDayColClicks() {
        document.getElementById('daysScroll').onclick = function(e) {
            if (e.target.closest('.event')) return;
            if (dragState) return;
            var col = e.target.closest('.day-col');
            if (!col) return;
            var dayIdx = parseInt(col.id.replace('dayCol',''));
            if (isNaN(dayIdx)) return;
            var rect = col.getBoundingClientRect();
            var yOff = e.clientY - rect.top;
            var totalMin = START_HOUR * 60 + (yOff / (HOUR_PX/60));
            var hour = Math.floor(totalMin / 60);
            var minute = Math.round((totalMin % 60) / 15) * 15;
            if (minute >= 60) { hour++; minute = 0; }
            openCatPicker(e, dayIdx, hour, minute);
        };
    }

    initCatPicker();

    // ===== INIT =====
    renderAgenda(); attachDayColClicks(); loadCalendarData();
    setInterval(loadCalendarData, 5*60*1000);
    setInterval(function() { document.querySelectorAll('.now-line').forEach(function(e){e.remove();}); renderAgenda(); }, 60000);
</script>
</body>
