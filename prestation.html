<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestations - Studio CIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e4e4e4;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .page-wrapper { max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; padding: 20px 0 30px; }
        .header img { width: 80px; height: auto; margin-bottom: 8px; }
        .header h1 { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .header .sub { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

        .fiches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .fiche-card {
            background: #3c3c3c;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(80,90,100,0.3);
            cursor: pointer;
            transition: all 0.15s;
        }
        .fiche-card:hover {
            border-color: rgba(0,200,255,0.4);
            transform: translateY(-2px);
        }

        .fiche-title {
            font-size: 18px; font-weight: bold; color: #fff;
            text-align: center; margin-bottom: 6px;
            background: #2a2d35;
            border-radius: 10px;
            padding: 10px;
        }
        .fiche-date {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .fiche-field {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .fiche-label {
            background: #555;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .fiche-value {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .fiche-heure {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .heure-badge {
            font-size: 0.72rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 8px;
        }
        .heure-prep { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
        .heure-direct { background: rgba(0,200,255,0.15); color: #00d4ff; }

        .fiche-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .fiche-tag {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.4);
        }
        .fiche-tag.on { background: rgba(0,200,255,0.12); color: #00d4ff; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .new-btn {
            background: #00d4ff;
            color: #111;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .new-btn:hover { background: #00e8ff; }

        .count-badge {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        .nav-back {
            display: inline-flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.4); text-decoration: none;
            font-size: 0.78rem; margin-bottom: 14px; transition: color 0.15s;
        }
        .nav-back:hover { color: rgba(255,255,255,0.7); }

        /* Status indicator */
        .sync-status {
            position: fixed;
            top: 12px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            z-index: 100;
        }
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }
        .sync-dot.connected { background: #00d4ff; }
        .sync-dot.error { background: #ff4444; }
        .sync-dot.syncing { background: #f5a623; animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.3)} }

        .delete-all-btn {
            background: rgba(255,60,60,0.15);
            color: #ff6060;
            border: 1px solid rgba(255,60,60,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .delete-all-btn:hover {
            background: rgba(255,60,60,0.3);
            border-color: rgba(255,60,60,0.6);
        }

        .fiche-card { position: relative; }
        .fiche-delete-btn {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(255,60,60,0.12);
            color: rgba(255,80,80,0.7);
            border: 1px solid rgba(255,60,60,0.2);
            border-radius: 7px;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            z-index: 2;
        }
        .fiche-delete-btn:hover {
            background: rgba(255,60,60,0.35);
            color: #fff;
            border-color: rgba(255,60,60,0.6);
        }

        /* Modal confirmation */
        .confirm-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: #2a2d35;
            border-radius: 14px;
            padding: 28px 32px;
            text-align: center;
            border: 1px solid rgba(255,60,60,0.3);
            max-width: 340px;
            width: 90%;
        }
        .confirm-box h3 { color: #fff; margin-bottom: 10px; font-size: 1rem; }
        .confirm-box p { color: rgba(255,255,255,0.5); font-size: 0.82rem; margin-bottom: 22px; }
        .confirm-actions { display: flex; gap: 10px; justify-content: center; }
        .confirm-yes {
            background: rgba(255,60,60,0.8); color: #fff;
            border: none; padding: 9px 22px; border-radius: 8px;
            font-weight: bold; font-size: 0.85rem; cursor: pointer;
        }
        .confirm-yes:hover { background: rgba(255,60,60,1); }
        .confirm-no {
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
            border: none; padding: 9px 22px; border-radius: 8px;
            font-size: 0.85rem; cursor: pointer;
        }
        .confirm-no:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncLabel">Connexion…</span>
        <span style="margin-left:10px;color:rgba(255,255,255,0.6);font-size:0.72rem;font-weight:bold;background:rgba(255,255,255,0.07);padding:3px 8px;border-radius:6px;" id="versionBadgePresta"></span>
    </div>

    <a href="index.html" class="nav-back">← Retour Content Manager</a>
    <div class="page-wrapper">
        <div class="header">
            <img src="logo-cic.png" alt="CIC">
            <h1>Prestations Studio</h1>
            <div class="sub">Toutes les fiches de réservation</div>
        </div>

        <div class="actions-bar">
            <a href="contact-studio.html" class="new-btn" onclick="newFiche()">＋ Nouvelle fiche</a>
            <div style="display:flex;align-items:center;gap:12px;">
                <span class="count-badge" id="countBadge"></span>
                <button onclick="forceSyncToServer()" id="syncBtn" style="background:rgba(0,200,255,0.12);color:#00d4ff;border:1px solid rgba(0,200,255,0.3);padding:10px 16px;border-radius:10px;font-size:0.8rem;font-weight:bold;cursor:pointer;">☁️ Sync</button>
                <button class="delete-all-btn" onclick="confirmDeleteAll()">🗑 Tout supprimer</button>
            </div>
        </div>

        <!-- Modal confirmation suppression -->
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <h3 id="confirmTitle">Confirmer la suppression</h3>
                <p id="confirmMsg">Cette action est irréversible.</p>
                <div class="confirm-actions">
                    <button class="confirm-yes" id="confirmYesBtn">Supprimer</button>
                    <button class="confirm-no" onclick="closeConfirm()">Annuler</button>
                </div>
            </div>
        </div>

        <div class="fiches-grid" id="fichesGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            Aucune prestation enregistrée.<br>Créez une nouvelle fiche pour commencer.
        </div>
    </div>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        const WS_SERVER_URL = 'wss://ecamm-overlay-server.onrender.com';
        const API_BASE_URL  = 'https://ecamm-overlay-server.onrender.com';

        let ws = null;
        let fichesData = {};
        let reconnectTimer = null;

        // =============================================
        // SYNC STATUS UI
        // =============================================
        function setStatus(state, label) {
            const dot = document.getElementById('syncDot');
            const lbl = document.getElementById('syncLabel');
            dot.className = 'sync-dot ' + state;
            lbl.textContent = label;
        }

        // =============================================
        // LOAD FICHES VIA REST API (initial + fallback)
        // =============================================
        async function fetchFichesFromServer() {
            try {
                const res = await fetch(API_BASE_URL + '/api/fiches');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const serverData = await res.json();
                // localStorage TOUJOURS prioritaire
                const localData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
                fichesData = Object.assign({}, serverData, localData);
                localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                renderFiches();
                // Auto-sync fiches locales absentes du serveur
                const newLocals = Object.keys(localData).filter(k => !serverData[k]);
                if (newLocals.length > 0) {
                    const syncFn = () => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'fiches_save', data: fichesData }));
                        } else {
                            fetch(API_BASE_URL + '/api/fiches', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(fichesData)
                            }).catch(e => console.warn('Auto-sync failed:', e));
                        }
                    };
                    setTimeout(syncFn, 500);
                }
            } catch (err) {
                console.warn('API fetch failed, using localStorage:', err);
                fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
                renderFiches();
            }
        }

        // =============================================
        // WEBSOCKET — real-time sync between machines
        // =============================================
        function connectWebSocket() {
            if (ws && ws.readyState <= 1) return; // already open or connecting

            setStatus('', 'Connexion…');
            ws = new WebSocket(WS_SERVER_URL);

            ws.onopen = () => {
                setStatus('connected', 'Connecté');
                // Request latest fiches
                ws.send(JSON.stringify({ type: 'fiches_get' }));
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'fiches_data' || msg.type === 'fiches_updated') {
                        if (!window._isDeleting) {
                            fichesData = msg.data || {};
                            localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                            renderFiches();
                        }
                    }
                } catch (err) {
                    console.error('WS parse error:', err);
                }
            };

            ws.onclose = () => {
                setStatus('error', 'Déconnecté');
                scheduleReconnect();
            };

            ws.onerror = () => {
                setStatus('error', 'Erreur connexion');
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWebSocket();
            }, 3000);
        }

        // =============================================
        // RENDER
        // =============================================
        function renderFiches() {
            const grid = document.getElementById('fichesGrid');
            const empty = document.getElementById('emptyState');
            const count = document.getElementById('countBadge');
            const entries = Object.values(fichesData).sort((a, b) =>
                (b.updatedAt || '').localeCompare(a.updatedAt || '')
            );

            count.textContent = entries.length + ' prestation' + (entries.length > 1 ? 's' : '');

            if (entries.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';

            grid.innerHTML = entries.map(f => {
                const toggleTags = Object.entries(f.toggles || {}).map(([k, v]) =>
                    `<span class="fiche-tag ${v === 'oui' ? 'on' : ''}">${k}: ${v || '-'}</span>`
                ).join('');

                return `
                <div class="fiche-card" onclick="openFiche('${f.id}')">
                    <button class="fiche-delete-btn" onclick="event.stopPropagation(); confirmDeleteFiche('${f.id}', '${(f.titre||'cette fiche').replace(/'/g,'\'')}')" title="Supprimer cette fiche">✕</button>
                    <div class="fiche-title">${f.titre || 'Sans titre'}</div>
                    <div class="fiche-date">${f.date || 'Date non définie'}</div>
                    <div class="fiche-field">
                        <span class="fiche-label">Entité groupe</span>
                        <span class="fiche-value">${f.entite || '-'}</span>
                    </div>
                    <div class="fiche-field">
                        <span class="fiche-label">Contact</span>
                        <span class="fiche-value">${f.contact || '-'}</span>
                    </div>
                    <div class="fiche-heure">
                        <span class="heure-badge heure-prep">Prépa: ${f.heurePrep || '--:--'}</span>
                        <span class="heure-badge heure-direct">Direct: ${f.heureDirect || '--:--'}</span>
                    </div>
                    ${f.application ? `<div class="fiche-field"><span class="fiche-label">App</span><span class="fiche-value">${f.application}</span></div>` : ''}
                    ${f.intervenants && f.intervenants.length ? `<div class="fiche-field"><span class="fiche-label">Intervenants</span><span class="fiche-value">${f.intervenants.length} personne(s)</span></div>` : ''}
                    <div class="fiche-tags">${toggleTags}</div>
                </div>`;
            }).join('');
        }

        // =============================================
        // SUPPRESSION
        // =============================================
        let _pendingDeleteId = null;
        let _pendingDeleteAll = false;

        function showConfirm() {
            const overlay = document.getElementById('confirmOverlay');
            overlay.style.display = 'flex';
        }

        function confirmDeleteFiche(id, titre) {
            _pendingDeleteId = id;
            _pendingDeleteAll = false;
            document.getElementById('confirmTitle').textContent = 'Supprimer cette fiche ?';
            document.getElementById('confirmMsg').textContent = '"' + titre + '" sera définitivement supprimée.';
            document.getElementById('confirmYesBtn').onclick = executePendingDelete;
            showConfirm();
        }

        function confirmDeleteAll() {
            const count = Object.keys(fichesData).length;
            _pendingDeleteId = null;
            _pendingDeleteAll = true;
            document.getElementById('confirmTitle').textContent = 'Tout supprimer ?';
            document.getElementById('confirmMsg').textContent = count > 0
                ? count + ' prestation' + (count > 1 ? 's' : '') + ' seront définitivement supprimées.'
                : 'Toutes les prestations seront supprimées.';
            document.getElementById('confirmYesBtn').onclick = executePendingDelete;
            showConfirm();
        }

        function closeConfirm() {
            document.getElementById('confirmOverlay').style.display = 'none';
            _pendingDeleteId = null;
            _pendingDeleteAll = false;
        }

        async function executePendingDelete() {
            closeConfirm();
            if (_pendingDeleteAll) {
                fichesData = {};
            } else if (_pendingDeleteId) {
                delete fichesData[_pendingDeleteId];
            }
            localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
            renderFiches();
            // Bloquer le re-render du broadcast WS pendant 2s
            window._isDeleting = true;
            setTimeout(() => { window._isDeleting = false; }, 2000);
            // REST API d abord
            try {
                await fetch(API_BASE_URL + '/api/fiches', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fichesData)
                });
            } catch(e) { console.warn('API save failed:', e); }
            // WS pour notifier les autres clients
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'fiches_save', data: fichesData }));
            }
        }

        // =============================================
        // NAVIGATION
        // =============================================
        function openFiche(id) {
            localStorage.setItem('currentFicheId', id);
            window.location.href = 'contact-studio.html';
        }

        function newFiche() {
            localStorage.removeItem('currentFicheId');
        }

        // =============================================
        // SYNC FORCÉ VERS SERVEUR
        // =============================================
        async function forceSyncToServer() {
            const btn = document.getElementById('syncBtn');
            const local = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
            const count = Object.keys(local).length;
            if (count === 0) {
                btn.textContent = '⚠️ Rien en local';
                setTimeout(() => { btn.textContent = '☁️ Sync'; }, 2000);
                return;
            }
            btn.textContent = '⏳ Connexion...';

            // Attendre que le WS soit connecté (max 5s)
            await new Promise((resolve) => {
                if (ws && ws.readyState === WebSocket.OPEN) return resolve();
                connectWebSocket();
                let attempts = 0;
                const check = setInterval(() => {
                    attempts++;
                    if (ws && ws.readyState === WebSocket.OPEN) { clearInterval(check); resolve(); }
                    else if (attempts > 25) { clearInterval(check); resolve(); } // timeout 5s
                }, 200);
            });

            btn.textContent = '⏳ Envoi...';
            setStatus('syncing', 'Sync...');
            try {
                // Envoyer via WS (méthode principale — le serveur broadcast à tous les clients)
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'fiches_save', data: local }));
                    fichesData = local;
                    localStorage.setItem('fiches_studio', JSON.stringify(local));
                    setStatus('connected', 'Connecté');
                    btn.textContent = '✅ ' + count + ' fiche(s) sync';
                    btn.style.background = 'rgba(74,222,128,0.15)';
                    btn.style.color = '#4ade80';
                    setTimeout(() => {
                        btn.textContent = '☁️ Sync';
                        btn.style.background = 'rgba(0,200,255,0.12)';
                        btn.style.color = '#00d4ff';
                    }, 3000);
                } else {
                    throw new Error('WS non connecté');
                }
            } catch(e) {
                btn.textContent = '❌ ' + e.message;
                btn.style.color = '#ff6060';
                setTimeout(() => {
                    btn.textContent = '☁️ Sync';
                    btn.style.color = '#00d4ff';
                }, 3000);
                console.error('Sync failed:', e);
            }
        }

        // =============================================
        // INIT
        // =============================================
        // Badge version
        (function() {
            var b = document.getElementById('versionBadgePresta');
            if (b) b.textContent = 'v8 — 2026-03-27 13:39';
        })();

        // 1. Load from localStorage immediately (instant display)
        fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
        renderFiches();

        // 2. Then connect WebSocket for real-time sync
        connectWebSocket();

        // fetchFichesFromServer appelé via WS uniquement
        // NE PAS fetch au démarrage — localStorage est la source de vérité
    </script>
</body>
</html>
