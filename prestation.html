<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestations - Studio CIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e4e4e4;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== FOND DYNAMIQUE POCHETTES D'ALBUM ===== */
        .album-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }
        .album-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, rgba(26,26,26,0.55) 0%, rgba(26,26,26,0.85) 50%, rgba(26,26,26,0.97) 100%);
            z-index: 1;
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 120px);
            gap: 4px;
            position: absolute;
            top: -60px; left: -60px; right: -60px; bottom: -60px;
            animation: albumDrift 60s linear infinite;
            opacity: 0.35;
        }
        @keyframes albumDrift {
            0% { transform: translate(0, 0) rotate(-2deg); }
            50% { transform: translate(-30px, -20px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(-2deg); }
        }
        .album-cell {
            width: 120px;
            height: 120px;
            border-radius: 4px;
            background-size: cover;
            background-position: center;
            animation: albumPulse 8s ease-in-out infinite;
        }
        .album-cell:nth-child(odd) { animation-delay: -3s; }
        .album-cell:nth-child(3n) { animation-delay: -5s; }
        .album-cell:nth-child(4n+1) { animation-delay: -1s; }
        @keyframes albumPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.03); }
        }

        .page-wrapper { max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }

        .header { text-align: center; padding: 20px 0 30px; }
        .header img { width: 104px; height: auto; margin-bottom: 8px; }
        .header h1 { font-size: 1.5rem; font-weight: bold; color: #fff; }

        .fiches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .fiche-card {
            background: #3c3c3c;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(80,90,100,0.3);
            cursor: pointer;
            transition: all 0.15s;
        }
        .fiche-card:hover {
            border-color: rgba(0,200,255,0.4);
            transform: translateY(-2px);
        }

        .fiche-title {
            font-size: 18px; font-weight: bold; color: #fff;
            text-align: center; margin-bottom: 6px;
            background: #2a2d35;
            border-radius: 10px;
            padding: 10px;
        }
        .fiche-date {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .fiche-field {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .fiche-label {
            background: #555;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .fiche-value {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .fiche-heure {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .heure-badge {
            font-size: 0.72rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 8px;
        }
        .heure-prep { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
        .heure-direct { background: rgba(0,200,255,0.15); color: #00d4ff; }

        .fiche-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .fiche-tag {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.4);
        }
        .fiche-tag.on { background: rgba(0,200,255,0.12); color: #00d4ff; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .new-btn {
            background: #00d4ff;
            color: #111;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .new-btn:hover { background: #00e8ff; }

        .count-badge {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        .nav-back {
            display: inline-flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.4); text-decoration: none;
            font-size: 0.78rem; margin-bottom: 14px; transition: color 0.15s;
            position: relative; z-index: 2;
        }
        .nav-back:hover { color: rgba(255,255,255,0.7); }

        /* Status indicator */
        .sync-status {
            position: fixed;
            top: 12px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            z-index: 100;
        }
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }
        .sync-dot.connected { background: #00d4ff; }
        .sync-dot.error { background: #ff4444; }
    </style>
</head>
<body>
    <div class="album-bg"><div class="album-grid" id="albumGrid"></div></div>

    <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncLabel">Connexion…</span>
    </div>

    <a href="index.html" class="nav-back">← Retour Content Manager</a>
    <div class="page-wrapper">
        <div class="header">
            <img src="logo-cic.png" alt="CIC">
            <h1>Prestations Studio</h1>
        </div>

        <div class="actions-bar">
            <a href="contact-studio.html" class="new-btn" onclick="newFiche()">＋ Nouvelle fiche</a>
            <span class="count-badge" id="countBadge"></span>
        </div>

        <div class="fiches-grid" id="fichesGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            Aucune prestation enregistrée.<br>Créez une nouvelle fiche pour commencer.
        </div>
    </div>

    <script>
        // =============================================
        // FOND DYNAMIQUE - POCHETTES D'ALBUM
        // =============================================
        const ALBUM_COVERS = [
            'https://i.scdn.co/image/ab67616d0000b273ff9ca10b55ce82ae553c8228', // Random Access Memories - Daft Punk
            'https://i.scdn.co/image/ab67616d0000b273dc30583ba717007b00cceb25', // The Dark Side of the Moon
            'https://i.scdn.co/image/ab67616d0000b27384243a01af3c77b56fe01ab1', // Kind of Blue
            'https://i.scdn.co/image/ab67616d0000b2734ce8b4e42588bf18182a1ad2', // Discovery - Daft Punk
            'https://i.scdn.co/image/ab67616d0000b273e8b066f70c206551210d902b', // Thriller
            'https://i.scdn.co/image/ab67616d0000b273e319baafd16e84f0408af2a0', // A Night at the Opera
            'https://i.scdn.co/image/ab67616d0000b27367c738a703dc979f5c3c52ef', // Wish You Were Here
            'https://i.scdn.co/image/ab67616d0000b2732a038d3bf875d23e4aeaa84e', // AM - Arctic Monkeys
            'https://i.scdn.co/image/ab67616d0000b273b0dd6a5cd1649c4a390f6f7a', // Rumours - Fleetwood Mac
            'https://i.scdn.co/image/ab67616d0000b273f46b9d202509a8f7384b90de', // Homework - Daft Punk
            'https://i.scdn.co/image/ab67616d0000b2739a95e89d24214b94de36ccf7', // OK Computer
            'https://i.scdn.co/image/ab67616d0000b27349d694203245f241a1bcaa72', // Currents - Tame Impala
            'https://i.scdn.co/image/ab67616d0000b273b1c4b76e23414c9f20242268', // Born to Run
            'https://i.scdn.co/image/ab67616d0000b2738b32b139981e79f2571cc6d8', // The Rise and Fall of Ziggy Stardust
            'https://i.scdn.co/image/ab67616d0000b273ba5db46f4b838ef6027e6f96', // Abbey Road
            'https://i.scdn.co/image/ab67616d0000b27390a50cfe99a4c19ff3cbfbdb', // Blonde - Frank Ocean
            'https://i.scdn.co/image/ab67616d0000b273c5649add07ed3720be9d5526', // Purple Rain
            'https://i.scdn.co/image/ab67616d0000b273de437d960dda1ac0a3ff0e47', // Nevermind
            'https://i.scdn.co/image/ab67616d0000b2738399047ff71200928f5b6508', // My Beautiful Dark Twisted Fantasy
            'https://i.scdn.co/image/ab67616d0000b273fdbb405ad514b0fe66ec9cf0', // Channel Orange
            'https://i.scdn.co/image/ab67616d0000b273712701c5e263efc8726b1464', // Hounds of Love - Kate Bush
            'https://i.scdn.co/image/ab67616d0000b2736c7112082b63beefffe40151', // Human After All - Daft Punk
            'https://i.scdn.co/image/ab67616d0000b273407bd04707c463bbb3410424', // IGOR - Tyler
            'https://i.scdn.co/image/ab67616d0000b273c8b444df094279e70d0ed856', // After Hours - The Weeknd
        ];

        function initAlbumBackground() {
            const grid = document.getElementById('albumGrid');
            if (!grid) return;
            // Calculer combien de cellules pour couvrir l'écran
            const cols = Math.ceil((window.innerWidth + 120) / 124);
            const rows = Math.ceil((window.innerHeight + 120) / 124);
            const total = cols * rows;

            let html = '';
            for (let i = 0; i < total; i++) {
                const cover = ALBUM_COVERS[i % ALBUM_COVERS.length];
                html += '<div class="album-cell" style="background-image:url(' + cover + ')"></div>';
            }
            grid.innerHTML = html;
            grid.style.gridTemplateColumns = 'repeat(' + cols + ', 120px)';
        }

        initAlbumBackground();
        window.addEventListener('resize', initAlbumBackground);
    </script>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        const WS_SERVER_URL = 'wss://ecamm-overlay-server.onrender.com';
        const API_BASE_URL  = 'https://ecamm-overlay-server.onrender.com';

        let ws = null;
        let fichesData = {};
        let reconnectTimer = null;

        // =============================================
        // SYNC STATUS UI
        // =============================================
        function setStatus(state, label) {
            const dot = document.getElementById('syncDot');
            const lbl = document.getElementById('syncLabel');
            dot.className = 'sync-dot ' + state;
            lbl.textContent = label;
        }

        // =============================================
        // LOAD FICHES VIA REST API (initial + fallback)
        // =============================================
        async function fetchFichesFromServer() {
            try {
                const res = await fetch(API_BASE_URL + '/api/fiches');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                fichesData = await res.json();
                renderFiches();
                // Also cache locally as fallback
                localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
            } catch (err) {
                console.warn('⚠️ API fetch failed, using localStorage cache:', err);
                fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
                renderFiches();
            }
        }

        // =============================================
        // WEBSOCKET — real-time sync between machines
        // =============================================
        function connectWebSocket() {
            if (ws && ws.readyState <= 1) return; // already open or connecting

            setStatus('', 'Connexion…');
            ws = new WebSocket(WS_SERVER_URL);

            ws.onopen = () => {
                setStatus('connected', 'Connecté');
                // Request latest fiches
                ws.send(JSON.stringify({ type: 'fiches_get' }));
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'fiches_data') {
                        // Full fiches object from server
                        fichesData = msg.data || {};
                        localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                        renderFiches();
                    }
                    else if (msg.type === 'fiches_updated') {
                        // Another client saved/deleted — refresh
                        fichesData = msg.data || {};
                        localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                        renderFiches();
                    }
                } catch (err) {
                    console.error('WS parse error:', err);
                }
            };

            ws.onclose = () => {
                setStatus('error', 'Déconnecté');
                scheduleReconnect();
            };

            ws.onerror = () => {
                setStatus('error', 'Erreur connexion');
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connectWebSocket();
            }, 3000);
        }

        // =============================================
        // RENDER
        // =============================================
        function renderFiches() {
            const grid = document.getElementById('fichesGrid');
            const empty = document.getElementById('emptyState');
            const count = document.getElementById('countBadge');
            const entries = Object.values(fichesData).sort((a, b) =>
                (b.updatedAt || '').localeCompare(a.updatedAt || '')
            );

            count.textContent = entries.length + ' prestation' + (entries.length > 1 ? 's' : '');

            if (entries.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';

            grid.innerHTML = entries.map(f => {
                const toggleTags = Object.entries(f.toggles || {}).map(([k, v]) =>
                    `<span class="fiche-tag ${v === 'oui' ? 'on' : ''}">${k}: ${v || '-'}</span>`
                ).join('');

                return `
                <div class="fiche-card" onclick="openFiche('${f.id}')">
                    <div class="fiche-title">${f.titre || 'Sans titre'}</div>
                    <div class="fiche-date">${f.date || 'Date non définie'}</div>
                    <div class="fiche-field">
                        <span class="fiche-label">Entité groupe</span>
                        <span class="fiche-value">${f.entite || '-'}</span>
                    </div>
                    <div class="fiche-field">
                        <span class="fiche-label">Contact</span>
                        <span class="fiche-value">${f.contact || '-'}</span>
                    </div>
                    <div class="fiche-heure">
                        <span class="heure-badge heure-prep">Prépa: ${f.heurePrep || '--:--'}</span>
                        <span class="heure-badge heure-direct">Direct: ${f.heureDirect || '--:--'}</span>
                    </div>
                    ${f.application ? `<div class="fiche-field"><span class="fiche-label">App</span><span class="fiche-value">${f.application}</span></div>` : ''}
                    ${f.intervenants && f.intervenants.length ? `<div class="fiche-field"><span class="fiche-label">Intervenants</span><span class="fiche-value">${f.intervenants.length} personne(s)</span></div>` : ''}
                    <div class="fiche-tags">${toggleTags}</div>
                </div>`;
            }).join('');
        }

        // =============================================
        // NAVIGATION
        // =============================================
        function openFiche(id) {
            localStorage.setItem('currentFicheId', id);
            window.location.href = 'contact-studio.html';
        }

        function newFiche() {
            localStorage.removeItem('currentFicheId');
        }

        // =============================================
        // INIT
        // =============================================
        // 1. Load from localStorage immediately (instant display)
        fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
        renderFiches();

        // 2. Then connect WebSocket for real-time sync
        connectWebSocket();

        // 3. Also fetch via REST API as backup
        fetchFichesFromServer();
    </script>
</body>
</html>
