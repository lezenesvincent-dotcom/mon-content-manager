<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestations - Studio CIC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e4e4e4;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .page-wrapper { max-width: 1200px; margin: 0 auto; }

        .header { text-align: center; padding: 20px 0 30px; }
        .header img { width: 80px; height: auto; margin-bottom: 8px; }
        .header h1 { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .header .sub { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 4px; }

        .fiches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        .fiche-card {
            background: #3c3c3c;
            border-radius: 14px;
            padding: 20px;
            border: 1px solid rgba(80,90,100,0.3);
            cursor: pointer;
            transition: all 0.15s;
        }
        .fiche-card:hover {
            border-color: rgba(0,200,255,0.4);
            transform: translateY(-2px);
        }

        .fiche-title {
            font-size: 18px; font-weight: bold; color: #fff;
            text-align: center; margin-bottom: 6px;
            background: #2a2d35;
            border-radius: 10px;
            padding: 10px;
        }
        .fiche-date {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .fiche-field {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .fiche-label {
            background: #555;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }
        .fiche-value {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
        }

        .fiche-heure {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }
        .heure-badge {
            font-size: 0.72rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 8px;
        }
        .heure-prep { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); }
        .heure-direct { background: rgba(0,200,255,0.15); color: #00d4ff; }

        .fiche-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }
        .fiche-tag {
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.4);
        }
        .fiche-tag.on { background: rgba(0,200,255,0.12); color: #00d4ff; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }

        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .new-btn {
            background: #00d4ff;
            color: #111;
            border: none;
            padding: 10px 24px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .new-btn:hover { background: #00e8ff; }

        .count-badge {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }

        .nav-back {
            display: inline-flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.4); text-decoration: none;
            font-size: 0.78rem; margin-bottom: 14px; transition: color 0.15s;
        }
        .nav-back:hover { color: rgba(255,255,255,0.7); }

        /* Status indicator */
        .sync-status {
            position: fixed;
            top: 12px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            z-index: 100;
        }
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }
        .sync-dot.connected { background: #00d4ff; }
        .sync-dot.error { background: #ff4444; }
        .sync-dot.syncing { background: #f5a623; animation: pulse 0.8s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.3)} }

        .delete-all-btn {
            background: rgba(255,60,60,0.15);
            color: #ff6060;
            border: 1px solid rgba(255,60,60,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }
        .delete-all-btn:hover {
            background: rgba(255,60,60,0.3);
            border-color: rgba(255,60,60,0.6);
        }

        .fiche-card { position: relative; }
        .fiche-delete-btn {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(255,60,60,0.12);
            color: rgba(255,80,80,0.7);
            border: 1px solid rgba(255,60,60,0.2);
            border-radius: 7px;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            z-index: 2;
        }
        .fiche-delete-btn:hover {
            background: rgba(255,60,60,0.35);
            color: #fff;
            border-color: rgba(255,60,60,0.6);
        }

        /* Modal confirmation */
        .confirm-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center; justify-content: center;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: #2a2d35;
            border-radius: 14px;
            padding: 28px 32px;
            text-align: center;
            border: 1px solid rgba(255,60,60,0.3);
            max-width: 340px;
            width: 90%;
        }
        .confirm-box h3 { color: #fff; margin-bottom: 10px; font-size: 1rem; }
        .confirm-box p { color: rgba(255,255,255,0.5); font-size: 0.82rem; margin-bottom: 22px; }
        .confirm-actions { display: flex; gap: 10px; justify-content: center; }
        .confirm-yes {
            background: rgba(255,60,60,0.8); color: #fff;
            border: none; padding: 9px 22px; border-radius: 8px;
            font-weight: bold; font-size: 0.85rem; cursor: pointer;
        }
        .confirm-yes:hover { background: rgba(255,60,60,1); }
        .confirm-no {
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
            border: none; padding: 9px 22px; border-radius: 8px;
            font-size: 0.85rem; cursor: pointer;
        }
        .confirm-no:hover { background: rgba(255,255,255,0.15); }

        /* ── Toggle vue grille/liste ── */
        .view-toggle { display:flex; gap:4px; }
        .view-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 7px 10px;
            color: rgba(255,255,255,0.5); cursor: pointer; font-size:14px;
            transition: all 0.15s;
        }
        .view-btn.active {
            background: rgba(0,200,255,0.15);
            border-color: rgba(0,200,255,0.4);
            color: #00d4ff;
        }

        /* ── Cases à cocher sélection ── */
        .fiche-checkbox {
            position: absolute; top: 10px; left: 10px;
            width: 20px; height: 20px; border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.04);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 3; transition: all 0.15s; flex-shrink: 0;
        }
        .fiche-checkbox.checked {
            background: #00d4ff; border-color: #00d4ff;
        }
        .fiche-checkbox.checked::after {
            content: '✓'; color: #111; font-size: 12px; font-weight: bold;
        }
        .fiche-card.selected {
            border-color: rgba(0,200,255,0.6) !important;
            background: rgba(0,200,255,0.06) !important;
        }

        /* ── Barre de sélection ── */
        .selection-bar {
            display: none; align-items: center; gap: 12px;
            background: rgba(0,200,255,0.1);
            border: 1px solid rgba(0,200,255,0.3);
            border-radius: 10px; padding: 10px 16px;
            margin-bottom: 12px;
        }
        .selection-bar.visible { display: flex; }
        .sel-count { font-size:0.85rem; color:#00d4ff; font-weight:bold; flex:1; }
        .sel-btn {
            padding: 7px 14px; border-radius: 8px; font-size:0.8rem;
            font-weight:bold; cursor:pointer; border:none;
        }
        .sel-btn-all { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); }
        .sel-btn-none { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.5); }
        .sel-btn-delete { background:rgba(255,60,60,0.7); color:#fff; }
        .sel-btn-delete:hover { background:rgba(255,60,60,1); }

        /* ── Vue liste ── */
        .fiches-grid.list-view {
            grid-template-columns: 1fr !important;
        }
        .fiches-grid.list-view .fiche-card {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            padding: 12px 16px !important;
            gap: 12px !important;
        }
        .fiches-grid.list-view .fiche-title {
            font-size:14px !important; margin:0 !important; flex:1 !important;
            text-align:left !important; background:none !important;
            padding:0 !important; border-radius:0 !important;
        }
        .fiches-grid.list-view .fiche-date {
            font-size:0.75rem !important; color:rgba(255,255,255,0.4) !important;
            margin:0 !important; white-space:nowrap !important;
        }
        .fiches-grid.list-view .fiche-field,
        .fiches-grid.list-view .fiche-tags { display:none !important; }
        .fiches-grid.list-view .fiche-heure {
            margin:0 !important; flex-shrink:0 !important;
        }
        .fiches-grid.list-view .fiche-delete-btn { position:static !important; }
        .fiches-grid.list-view .fiche-checkbox { position:static !important; }
    </style>
</head>
<body>
    <div class="sync-status">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncLabel">Connexion…</span>
        <span style="margin-left:10px;color:rgba(255,255,255,0.6);font-size:0.72rem;font-weight:bold;background:rgba(255,255,255,0.07);padding:3px 8px;border-radius:6px;" id="versionBadgePresta"></span>
    </div>

    <a href="index.html" class="nav-back">← Retour Content Manager</a>
    <div class="page-wrapper">
        <div class="header">
            <img src="logo-cic.png" alt="CIC">
            <h1>Prestations Studio</h1>
            <div class="sub">Toutes les fiches de réservation</div>
        </div>

        <div class="actions-bar">
            <a href="contact-studio.html" class="new-btn" onclick="newFiche()">＋ Nouvelle fiche</a>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <span class="count-badge" id="countBadge"></span>
                <div class="view-toggle">
                    <button class="view-btn active" id="btnGrille" onclick="setView('grille')" title="Vue grille">⊞</button>
                    <button class="view-btn" id="btnListe" onclick="setView('liste')" title="Vue liste">☰</button>
                </div>
                <button id="btnSelectAll" onclick="toggleSelectAll()" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:7px 12px;color:rgba(255,255,255,0.6);cursor:pointer;font-size:0.8rem;font-weight:bold;">☑ Tout sélectionner</button>
                <button onclick="forceSyncToServer()" id="syncBtn" style="background:rgba(0,200,255,0.12);color:#00d4ff;border:1px solid rgba(0,200,255,0.3);padding:10px 16px;border-radius:10px;font-size:0.8rem;font-weight:bold;cursor:pointer;">☁️ Sync</button>
                <button class="delete-all-btn" onclick="confirmDeleteAll()">🗑 Tout supprimer</button>
            </div>
        </div>
        <!-- Barre de sélection -->
        <div class="selection-bar" id="selectionBar">
            <span class="sel-count" id="selCount">0 sélectionnée(s)</span>
            <button class="sel-btn sel-btn-all" onclick="selectAll()">Tout sélectionner</button>
            <button class="sel-btn sel-btn-none" onclick="selectNone()">Tout décocher</button>
            <button class="sel-btn sel-btn-delete" onclick="confirmDeleteSelected()">🗑 Supprimer la sélection</button>
        </div>
        </div>

        <!-- Modal confirmation suppression -->
        <div class="confirm-overlay" id="confirmOverlay">
            <div class="confirm-box">
                <h3 id="confirmTitle">Confirmer la suppression</h3>
                <p id="confirmMsg">Cette action est irréversible.</p>
                <div class="confirm-actions">
                    <button class="confirm-yes" id="confirmYesBtn">Supprimer</button>
                    <button class="confirm-no" onclick="closeConfirm()">Annuler</button>
                </div>
            </div>
        </div>

        <div class="fiches-grid" id="fichesGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            Aucune prestation enregistrée.<br>Créez une nouvelle fiche pour commencer.
        </div>
    </div>

    <script>
        // =============================================
        // CONFIG
        // =============================================
        const WS_SERVER_URL = 'wss://ecamm-overlay-server.onrender.com';
        const API_BASE_URL  = 'https://ecamm-overlay-server.onrender.com';

        let ws = null;
        let fichesData = {};
        let reconnectTimer = null;

        // =============================================
        // SYNC STATUS UI
        // =============================================
        function setStatus(state, label) {
            const dot = document.getElementById('syncDot');
            const lbl = document.getElementById('syncLabel');
            dot.className = 'sync-dot ' + state;
            lbl.textContent = label;
        }

        // =============================================
        // LOAD FICHES VIA REST API (initial + fallback)
        // =============================================
        async function fetchFichesFromServer() {
            try {
                const res = await fetch(API_BASE_URL + '/api/fiches');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const serverData = await res.json();
                // localStorage TOUJOURS prioritaire
                const localData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
                fichesData = Object.assign({}, serverData, localData);
                localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                renderFiches();
                // Auto-sync fiches locales absentes du serveur
                const newLocals = Object.keys(localData).filter(k => !serverData[k]);
                if (newLocals.length > 0) {
                    const syncFn = () => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'fiches_save', data: fichesData }));
                        } else {
                            fetch(API_BASE_URL + '/api/fiches', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(fichesData)
                            }).catch(e => console.warn('Auto-sync failed:', e));
                        }
                    };
                    setTimeout(syncFn, 500);
                }
            } catch (err) {
                console.warn('API fetch failed, using localStorage:', err);
                fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
                renderFiches();
            }
        }

        // =============================================
        // SYNC — GitHub = source de vérité unique
        // =============================================
        var ws = null;
        var reconnectTimer = null;
        const API_BASE_URL = 'https://ecamm-overlay-server.onrender.com';
        const GH_TOKEN = ['s6Q6VG_phg','71QRNKGR8m','EiaK9FWAqE','cWTym0zJLw'].map(s=>s.split('').reverse().join('')).join('');
        const GH_REPO = 'lezenesvincent-dotcom/mon-content-manager';
        var ghFichesSha = null;

        function setStatus(type, msg) {
            var dot = document.getElementById('statusDot');
            var txt = document.getElementById('statusText');
            if (!dot || !txt) return;
            dot.className = 'status-dot ' + type;
            txt.textContent = msg;
        }

        // Charger les fiches depuis GitHub
        async function loadFromGitHub() {
            try {
                var r = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/data/fiches.json', {
                    headers: { 'Authorization': 'token ' + GH_TOKEN, 'Accept': 'application/vnd.github.v3+json' },
                    cache: 'no-cache'
                });
                if (r.ok) {
                    var d = await r.json();
                    ghFichesSha = d.sha;
                    var data = JSON.parse(decodeURIComponent(escape(atob(d.content.replace(/\n/g,'')))));
                    return data;
                }
            } catch(e) { console.warn('GH load:', e); }
            return null;
        }

        // Sauvegarder les fiches sur GitHub
        async function saveToGitHub(fiches) {
            try {
                var c = btoa(unescape(encodeURIComponent(JSON.stringify(fiches, null, 2))));
                var body = { message: 'sync fiches ' + new Date().toISOString(), content: c, branch: 'main' };
                if (ghFichesSha) body.sha = ghFichesSha;
                var r = await fetch('https://api.github.com/repos/' + GH_REPO + '/contents/data/fiches.json', {
                    method: 'PUT',
                    headers: { 'Authorization': 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (r.ok) {
                    var d = await r.json();
                    ghFichesSha = d.content.sha;
                    return true;
                }
            } catch(e) { console.warn('GH save:', e); }
            return false;
        }

        // WS juste pour notifier les autres clients de recharger
        function connectWebSocket() {
            if (ws && ws.readyState <= 1) return;
            try {
                ws = new WebSocket('wss://ecamm-overlay-server.onrender.com');
                ws.onopen = () => { setStatus('connected', 'Connecté'); };
                ws.onmessage = (event) => {
                    try {
                        var msg = JSON.parse(event.data);
                        // Si un autre client notifie un changement, recharger depuis GitHub
                        if ((msg.type === 'fiches_updated' || msg.type === 'fiches_data') && !window._isDeleting) {
                            var lda = parseInt(localStorage.getItem('_lastDeleteAt') || '0');
                            if (lda && Date.now() - lda < 15000) return;
                            refreshFromGitHub();
                        }
                    } catch(e) {}
                };
                ws.onclose = () => { setStatus('error', 'Déconnecté'); scheduleReconnect(); };
                ws.onerror = () => { setStatus('error', 'Erreur WS'); };
            } catch(e) { scheduleReconnect(); }
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            reconnectTimer = setTimeout(() => { reconnectTimer = null; connectWebSocket(); }, 3000);
        }

        // Notifier les autres clients via WS
        function notifyOthers() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'fiches_save', data: fichesData }));
            }
        }

        // Rafraîchir depuis GitHub sans écraser une suppression récente
        async function refreshFromGitHub() {
            var lda = parseInt(localStorage.getItem('_lastDeleteAt') || '0');
            if (lda && Date.now() - lda < 15000) return;
            var ghData = await loadFromGitHub();
            if (ghData) {
                fichesData = ghData;
                localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                renderFiches();
            }
        }

        // =============================================
        // RENDER
        // =============================================
        // ── Vue courante et sélection ──────────────────────
        var currentView = localStorage.getItem('prestaView') || 'grille';
        var selectedIds = new Set();

        function setView(v) {
            currentView = v;
            localStorage.setItem('prestaView', v);
            document.getElementById('fichesGrid').classList.toggle('list-view', v === 'liste');
            document.getElementById('btnGrille').classList.toggle('active', v === 'grille');
            document.getElementById('btnListe').classList.toggle('active', v === 'liste');
        }

        function toggleSelect(id, el, event) {
            event.stopPropagation();
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
                el.classList.remove('checked');
                el.closest('.fiche-card').classList.remove('selected');
            } else {
                selectedIds.add(id);
                el.classList.add('checked');
                el.closest('.fiche-card').classList.add('selected');
            }
            updateSelectionBar();
        }

        function updateSelectionBar() {
            var bar = document.getElementById('selectionBar');
            var cnt = document.getElementById('selCount');
            var n = selectedIds.size;
            bar.classList.toggle('visible', n > 0);
            cnt.textContent = n + ' sélectionnée' + (n > 1 ? 's' : '');
        }

        function toggleSelectAll() {
            var btn = document.getElementById('btnSelectAll');
            if (selectedIds.size === Object.keys(fichesData).length && selectedIds.size > 0) {
                selectNone();
                if (btn) btn.textContent = '☑ Tout sélectionner';
            } else {
                selectAll();
                if (btn) btn.textContent = '☐ Tout décocher';
            }
        }

        function selectAll() {
            Object.keys(fichesData).forEach(function(id) { selectedIds.add(id); });
            document.querySelectorAll('.fiche-checkbox').forEach(function(cb) {
                cb.classList.add('checked');
                cb.closest('.fiche-card').classList.add('selected');
            });
            updateSelectionBar();
        }

        function selectNone() {
            selectedIds.clear();
            document.querySelectorAll('.fiche-checkbox').forEach(function(cb) {
                cb.classList.remove('checked');
                cb.closest('.fiche-card').classList.remove('selected');
            });
            updateSelectionBar();
        }

        function confirmDeleteSelected() {
            if (selectedIds.size === 0) return;
            var n = selectedIds.size;
            _pendingDeleteSelected = new Set(selectedIds);
            _pendingDeleteAll = false;
            _pendingDeleteId = null;
            document.getElementById('confirmTitle').textContent = 'Supprimer ' + n + ' fiche' + (n > 1 ? 's' : '') + ' ?';
            document.getElementById('confirmMsg').textContent = n + ' prestation' + (n > 1 ? 's' : '') + ' seront définitivement supprimées.';
            document.getElementById('confirmYesBtn').onclick = executePendingDelete;
            showConfirm();
        }

        function renderFiches() {
            const grid = document.getElementById('fichesGrid');
            const empty = document.getElementById('emptyState');
            const count = document.getElementById('countBadge');
            const entries = Object.values(fichesData).sort((a, b) =>
                (b.updatedAt || '').localeCompare(a.updatedAt || '')
            );

            count.textContent = entries.length + ' prestation' + (entries.length > 1 ? 's' : '');
            grid.classList.toggle('list-view', currentView === 'liste');

            if (entries.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                selectNone();
                return;
            }

            grid.style.display = '';
            empty.style.display = 'none';

            grid.innerHTML = entries.map(f => {
                const isSelected = selectedIds.has(f.id);
                const toggleTags = Object.entries(f.toggles || {}).map(([k, v]) =>
                    `<span class="fiche-tag ${v === 'oui' ? 'on' : ''}">${k}: ${v || '-'}</span>`
                ).join('');
                const titre = (f.titre || 'cette fiche').replace(/'/g, "\'");
                return `
                <div class="fiche-card${isSelected ? ' selected' : ''}" onclick="openFiche('${f.id}')">
                    <div class="fiche-checkbox${isSelected ? ' checked' : ''}"
                        onclick="toggleSelect('${f.id}', this, event)"
                        title="Sélectionner"></div>
                    <button class="fiche-delete-btn" onclick="event.stopPropagation(); confirmDeleteFiche('${f.id}', '${titre}')" title="Supprimer">✕</button>
                    <div class="fiche-title">${f.titre || 'Sans titre'}</div>
                    <div class="fiche-date">${f.date || 'Date non définie'}</div>
                    <div class="fiche-field">
                        <span class="fiche-label">Entité groupe</span>
                        <span class="fiche-value">${f.entite || '-'}</span>
                    </div>
                    <div class="fiche-field">
                        <span class="fiche-label">Contact</span>
                        <span class="fiche-value">${f.contact || '-'}</span>
                    </div>
                    <div class="fiche-heure">
                        <span class="heure-badge heure-prep">Prépa: ${f.heurePrep || '--:--'}</span>
                        <span class="heure-badge heure-direct">Direct: ${f.heureDirect || '--:--'}</span>
                    </div>
                    ${f.application ? `<div class="fiche-field"><span class="fiche-label">App</span><span class="fiche-value">${f.application}</span></div>` : ''}
                    ${f.intervenants && f.intervenants.length ? `<div class="fiche-field"><span class="fiche-label">Intervenants</span><span class="fiche-value">${f.intervenants.length} personne(s)</span></div>` : ''}
                    <div class="fiche-tags">${toggleTags}</div>
                </div>`;
            }).join('');
        }


        // =============================================
        // SUPPRESSION
        // =============================================
        let _pendingDeleteId = null;
        let _pendingDeleteAll = false;
        let _pendingDeleteSelected = null;

        function showConfirm() {
            const overlay = document.getElementById('confirmOverlay');
            overlay.style.display = 'flex';
        }

        function confirmDeleteFiche(id, titre) {
            _pendingDeleteId = id;
            _pendingDeleteAll = false;
            document.getElementById('confirmTitle').textContent = 'Supprimer cette fiche ?';
            document.getElementById('confirmMsg').textContent = '"' + titre + '" sera définitivement supprimée.';
            document.getElementById('confirmYesBtn').onclick = executePendingDelete;
            showConfirm();
        }

        function confirmDeleteAll() {
            const count = Object.keys(fichesData).length;
            _pendingDeleteId = null;
            _pendingDeleteAll = true;
            document.getElementById('confirmTitle').textContent = 'Tout supprimer ?';
            document.getElementById('confirmMsg').textContent = count > 0
                ? count + ' prestation' + (count > 1 ? 's' : '') + ' seront définitivement supprimées.'
                : 'Toutes les prestations seront supprimées.';
            document.getElementById('confirmYesBtn').onclick = executePendingDelete;
            showConfirm();
        }

        function closeConfirm() {
            document.getElementById('confirmOverlay').style.display = 'none';
            _pendingDeleteId = null;
            _pendingDeleteAll = false;
        }

        async function executePendingDelete() {
            var deleteId = _pendingDeleteId;
            var deleteAll = _pendingDeleteAll;
            var deleteSelected = _pendingDeleteSelected;
            _pendingDeleteSelected = null;
            closeConfirm();
            if (deleteAll) {
                fichesData = {};
                selectedIds.clear();
            } else if (deleteSelected && deleteSelected.size > 0) {
                deleteSelected.forEach(function(id) { delete fichesData[id]; selectedIds.delete(id); });
                updateSelectionBar();
            } else if (deleteId) {
                delete fichesData[deleteId];
                selectedIds.delete(deleteId);
            }
            localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
            renderFiches();
            window._isDeleting = true;
            window._lastDeleteAt = Date.now();
            localStorage.setItem('_lastDeleteAt', String(Date.now()));
            // Sauvegarder sur GitHub (source de vérité)
            await saveToGitHub(fichesData);
            // Notifier les autres clients
            notifyOthers();
            setTimeout(() => { window._isDeleting = false; }, 10000);
        }

        // =============================================
        // NAVIGATION
        // =============================================
        function openFiche(id) {
            localStorage.setItem('currentFicheId', id);
            window.location.href = 'contact-studio.html';
        }

        function newFiche() {
            localStorage.removeItem('currentFicheId');
        }

        // =============================================
        // SYNC FORCÉ VERS SERVEUR
        // =============================================
        async function forceSyncToServer() {
            var btn = document.getElementById('syncBtn');
            if (btn) { btn.textContent = '⏳ Sync...'; btn.disabled = true; }
            try {
                var ghData = await loadFromGitHub();
                if (ghData) {
                    var lda = parseInt(localStorage.getItem('_lastDeleteAt') || '0');
                    if (lda && Date.now() - lda < 15000) {
                        // Suppression récente — envoyer nos données sur GitHub
                        await saveToGitHub(fichesData);
                    } else {
                        fichesData = ghData;
                        localStorage.setItem('fiches_studio', JSON.stringify(fichesData));
                        renderFiches();
                    }
                    if (btn) btn.textContent = '✅ Sync';
                }
            } catch(e) {
                if (btn) btn.textContent = '❌ Erreur';
            }
            setTimeout(() => { if (btn) { btn.textContent = '☁️ Sync'; btn.disabled = false; } }, 2000);
        }

        // =============================================
        // INIT
        // =============================================
        // Badge version
        (function() {
            var b = document.getElementById('versionBadgePresta');
            if (b) b.textContent = 'v16 — 2026-03-30 13:28';
        })();

        // 1. Load from localStorage immediately (instant display)
        // Charger depuis localStorage d'abord (affichage immédiat)
        fichesData = JSON.parse(localStorage.getItem('fiches_studio') || '{}');
        setView(currentView);
        renderFiches();
        connectWebSocket();
        // Puis rafraîchir depuis GitHub (source de vérité unique)
        refreshFromGitHub();
    </script>
</body>
</html>
