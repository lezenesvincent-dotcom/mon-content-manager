<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px;">

                <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; border-radius: 15px;">

                    <input type="text" id="editP1Sujet" maxlength="15"

                    <div style="text-align: right; color: rgba(255,255,255,0.8); font-size: 0.85rem; margin-top: 5px;" id="editCounterP1Sujet">0 / 15</div>

                    <textarea id="editP1Contenu" rows="7" maxlength="500"
                              placeholder="Contenu (7 lignes max)"
