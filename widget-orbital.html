<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>eCamm Overlay - Système Orbital P1-P4</title>
    <!-- Version 12.1 ORBITAL - Positions distinctes + orbites permanentes - 25 nov 2025 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
        }

        .overlay-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 1800px;
            height: 850px;
            transform-style: preserve-3d;
            perspective: 2000px;
        }

        /* ========== HEADER ========== */
        .header-row {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 5px;
            padding-left: 50px;
            height: 70px;
        }

        .main-title {
            font-size: 4.2rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.6);
            opacity: 0;
            animation: fallingLeaf 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            transform-style: preserve-3d;
        }

        .main-subtitle {
            font-size: 2.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            opacity: 0;
            animation: fallingLeaf 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s forwards;
            transform-style: preserve-3d;
        }

        @keyframes fallingLeaf {
            0% {
                opacity: 0;
                transform: translateY(-300px) rotateX(180deg) rotateZ(-45deg);
            }
            60% {
                transform: translateY(20px) rotateX(20deg) rotateZ(-10deg);
            }
            80% {
                transform: translateY(-5px) rotateX(5deg) rotateZ(-2deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotateX(0deg) rotateZ(0deg);
            }
        }

        /* ========== SYSTÈME ORBITAL ========== */
        .orbital-system {
            position: relative;
            width: 100%;
            height: 715px;
            margin-top: 50px;
            transform-style: preserve-3d;
            perspective: 2000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centre de l'orbite - point de référence */
        .orbital-center {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        /* ========== SUBJECT BOX - Mêmes dimensions que widget.html ========== */
        .subject-box {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: calc((100% - 90px) / 4); /* ~400px sur 1800px */
            transform-style: preserve-3d;
            transition: all 2s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        /* Sujet - titre au dessus */
        .subject-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 22px;
            letter-spacing: 1.2px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
            text-align: center;
            height: 45px;
            line-height: 45px;
            flex-shrink: 0;
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Cadre du contenu - même style que widget.html */
        .subject-content-box {
            background: linear-gradient(to bottom, 
                rgba(60, 80, 130, 0.75) 0%, 
                rgba(80, 100, 170, 0.75) 100%);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 28px 22px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            height: 448px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            flex-shrink: 0;
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        /* Effet lumineux pour box en focus */
        .subject-content-box::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(135deg, 
                rgba(138, 159, 255, 0.5) 0%, 
                rgba(164, 113, 222, 0.5) 50%,
                rgba(138, 159, 255, 0.5) 100%);
            opacity: 0;
            transition: opacity 0.5s;
            border-radius: 22px;
            z-index: -1;
        }

        .subject-content-box ul {
            list-style: none;
            padding: 0;
        }

        .subject-content-box li {
            font-size: 1.6rem;
            color: rgba(255, 255, 255, 0.95);
            margin: 12px 0;
            padding-left: 20px;
            position: relative;
            line-height: 1.4;
        }

        .subject-content-box li::before {
            content: '▸';
            position: absolute;
            left: 0;
            color: rgba(138, 159, 255, 0.8);
            font-size: 1.4rem;
        }

        /* ========== ANIMATION D'ENTRÉE : Feuilles mortes vers positions orbitales ========== */
        
        /* Box 1 (P1) - Arrive à sa position orbitale */
        @keyframes enterP1 {
            0% {
                opacity: 0;
                transform: translateY(-500px) translateZ(300px) rotateX(180deg) rotateY(90deg) rotateZ(60deg);
            }
            70% {
                opacity: 1;
                transform: translateY(30px) translateZ(50px) rotateX(20deg) rotateY(10deg) rotateZ(5deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateZ(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
        }

        @keyframes enterP2 {
            0% {
                opacity: 0;
                transform: translateY(-500px) translateX(200px) translateZ(300px) rotateX(-180deg) rotateY(-60deg) rotateZ(-45deg);
            }
            70% {
                opacity: 1;
                transform: translateY(20px) translateX(10px) translateZ(30px) rotateX(-15deg) rotateY(-5deg) rotateZ(-3deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0) translateZ(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
        }

        @keyframes enterP3 {
            0% {
                opacity: 0;
                transform: translateY(-500px) translateX(-100px) translateZ(300px) rotateX(160deg) rotateY(45deg) rotateZ(30deg);
            }
            70% {
                opacity: 1;
                transform: translateY(25px) translateX(-5px) translateZ(40px) rotateX(10deg) rotateY(5deg) rotateZ(2deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0) translateZ(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
        }

        @keyframes enterP4 {
            0% {
                opacity: 0;
                transform: translateY(-500px) translateX(150px) translateZ(300px) rotateX(-170deg) rotateY(-80deg) rotateZ(-50deg);
            }
            70% {
                opacity: 1;
                transform: translateY(35px) translateX(15px) translateZ(35px) rotateX(-12deg) rotateY(-8deg) rotateZ(-4deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) translateX(0) translateZ(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
        }

        /* ========== ORBITE PERMANENTE - Animation très lente et fluide ========== */
        
        /* Orbite pour les satellites (40 secondes = très lent) */
        @keyframes orbitSatellite1 {
            0% {
                transform: rotateY(0deg) translateX(550px) rotateY(0deg) translateZ(0px) rotateX(2deg) rotateZ(1deg) scale(0.88);
            }
            25% {
                transform: rotateY(90deg) translateX(550px) rotateY(-90deg) translateZ(-30px) rotateX(-1deg) rotateZ(-0.5deg) scale(0.88);
            }
            50% {
                transform: rotateY(180deg) translateX(550px) rotateY(-180deg) translateZ(0px) rotateX(2deg) rotateZ(1deg) scale(0.88);
            }
            75% {
                transform: rotateY(270deg) translateX(550px) rotateY(-270deg) translateZ(-30px) rotateX(-1deg) rotateZ(-0.5deg) scale(0.88);
            }
            100% {
                transform: rotateY(360deg) translateX(550px) rotateY(-360deg) translateZ(0px) rotateX(2deg) rotateZ(1deg) scale(0.88);
            }
        }

        @keyframes orbitSatellite2 {
            0% {
                transform: rotateY(120deg) translateX(550px) rotateY(-120deg) translateZ(-20px) rotateX(-1deg) rotateZ(0.5deg) scale(0.88);
            }
            25% {
                transform: rotateY(210deg) translateX(550px) rotateY(-210deg) translateZ(10px) rotateX(1.5deg) rotateZ(-1deg) scale(0.88);
            }
            50% {
                transform: rotateY(300deg) translateX(550px) rotateY(-300deg) translateZ(-20px) rotateX(-1deg) rotateZ(0.5deg) scale(0.88);
            }
            75% {
                transform: rotateY(390deg) translateX(550px) rotateY(-390deg) translateZ(10px) rotateX(1.5deg) rotateZ(-1deg) scale(0.88);
            }
            100% {
                transform: rotateY(480deg) translateX(550px) rotateY(-480deg) translateZ(-20px) rotateX(-1deg) rotateZ(0.5deg) scale(0.88);
            }
        }

        @keyframes orbitSatellite3 {
            0% {
                transform: rotateY(240deg) translateX(550px) rotateY(-240deg) translateZ(10px) rotateX(1deg) rotateZ(-0.8deg) scale(0.88);
            }
            25% {
                transform: rotateY(330deg) translateX(550px) rotateY(-330deg) translateZ(-25px) rotateX(-1.5deg) rotateZ(0.8deg) scale(0.88);
            }
            50% {
                transform: rotateY(420deg) translateX(550px) rotateY(-420deg) translateZ(10px) rotateX(1deg) rotateZ(-0.8deg) scale(0.88);
            }
            75% {
                transform: rotateY(510deg) translateX(550px) rotateY(-510deg) translateZ(-25px) rotateX(-1.5deg) rotateZ(0.8deg) scale(0.88);
            }
            100% {
                transform: rotateY(600deg) translateX(550px) rotateY(-600deg) translateZ(10px) rotateX(1deg) rotateZ(-0.8deg) scale(0.88);
            }
        }

        /* Animation pour la box centrale (focus) - Float subtil */
        @keyframes centerFloat {
            0%, 100% {
                transform: translateX(-50%) translateY(0) translateZ(80px) rotateY(0deg) rotateX(0deg) scale(1.05);
            }
            25% {
                transform: translateX(-50%) translateY(-10px) translateZ(90px) rotateY(2deg) rotateX(1deg) scale(1.05);
            }
            50% {
                transform: translateX(-50%) translateY(-5px) translateZ(85px) rotateY(-1deg) rotateX(-0.5deg) scale(1.05);
            }
            75% {
                transform: translateX(-50%) translateY(-12px) translateZ(95px) rotateY(1deg) rotateX(0.5deg) scale(1.05);
            }
        }

        /* ========== FOCUS STATES - Qui est au centre, qui orbite ========== */
        
        /* FOCUS 1 : P1 au centre */
        .orbital-system.focus-1 .subject-box:nth-child(1) {
            left: 50%;
            top: 50%;
            z-index: 100;
            animation: enterP1 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards,
                       centerFloat 20s cubic-bezier(0.45, 0.05, 0.55, 0.95) 1.7s infinite;
        }
        .orbital-system.focus-1 .subject-box:nth-child(1) .subject-content-box::before {
            opacity: 1;
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        .orbital-system.focus-1 .subject-box:nth-child(2) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: enterP2 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s forwards,
                       orbitSatellite1 40s linear 1.9s infinite;
        }
        .orbital-system.focus-1 .subject-box:nth-child(3) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: enterP3 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.7s forwards,
                       orbitSatellite2 40s linear 2.1s infinite;
        }
        .orbital-system.focus-1 .subject-box:nth-child(4) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: enterP4 1.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.9s forwards,
                       orbitSatellite3 40s linear 2.3s infinite;
        }

        /* FOCUS 2 : P2 au centre */
        .orbital-system.focus-2 .subject-box:nth-child(2) {
            left: 50%;
            top: 50%;
            z-index: 100;
            animation: centerFloat 20s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            transform: translateX(-50%) translateZ(80px) scale(1.05);
            opacity: 1;
        }
        .orbital-system.focus-2 .subject-box:nth-child(2) .subject-content-box::before {
            opacity: 1;
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        .orbital-system.focus-2 .subject-box:nth-child(1) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite1 40s linear infinite;
        }
        .orbital-system.focus-2 .subject-box:nth-child(3) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite2 40s linear infinite;
        }
        .orbital-system.focus-2 .subject-box:nth-child(4) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite3 40s linear infinite;
        }

        /* FOCUS 3 : P3 au centre */
        .orbital-system.focus-3 .subject-box:nth-child(3) {
            left: 50%;
            top: 50%;
            z-index: 100;
            animation: centerFloat 20s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            transform: translateX(-50%) translateZ(80px) scale(1.05);
            opacity: 1;
        }
        .orbital-system.focus-3 .subject-box:nth-child(3) .subject-content-box::before {
            opacity: 1;
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        .orbital-system.focus-3 .subject-box:nth-child(1) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite1 40s linear infinite;
        }
        .orbital-system.focus-3 .subject-box:nth-child(2) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite2 40s linear infinite;
        }
        .orbital-system.focus-3 .subject-box:nth-child(4) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite3 40s linear infinite;
        }

        /* FOCUS 4 : P4 au centre */
        .orbital-system.focus-4 .subject-box:nth-child(4) {
            left: 50%;
            top: 50%;
            z-index: 100;
            animation: centerFloat 20s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            transform: translateX(-50%) translateZ(80px) scale(1.05);
            opacity: 1;
        }
        .orbital-system.focus-4 .subject-box:nth-child(4) .subject-content-box::before {
            opacity: 1;
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        .orbital-system.focus-4 .subject-box:nth-child(1) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite1 40s linear infinite;
        }
        .orbital-system.focus-4 .subject-box:nth-child(2) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite2 40s linear infinite;
        }
        .orbital-system.focus-4 .subject-box:nth-child(3) {
            left: 50%;
            top: 50%;
            z-index: 50;
            opacity: 0.85;
            animation: orbitSatellite3 40s linear infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Status indicator */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
        }

        .status.connected {
            background: rgba(40, 167, 69, 0.3);
            color: #28a745;
            border: 2px solid #28a745;
        }

        .status.disconnected {
            background: rgba(220, 53, 69, 0.3);
            color: #dc3545;
            border: 2px solid #dc3545;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="status" class="status disconnected">Connexion...</div>

    <div class="overlay-container">
        <div class="header-row">
            <div class="main-title" id="mainTitle">Titre Principal</div>
            <div class="main-subtitle" id="mainSubtitle">Sous-titre</div>
        </div>

        <div class="orbital-system focus-1" id="orbitalSystem">
            <div class="orbital-center">
                <!-- P1 -->
                <div class="subject-box" data-subject="1">
                    <div class="subject-title" id="p1-title">SUJET 1</div>
                    <div class="subject-content-box">
                        <ul id="p1-content">
                            <li>Contenu P1 ligne 1</li>
                            <li>Contenu P1 ligne 2</li>
                        </ul>
                    </div>
                </div>
                <!-- P2 -->
                <div class="subject-box" data-subject="2">
                    <div class="subject-title" id="p2-title">SUJET 2</div>
                    <div class="subject-content-box">
                        <ul id="p2-content">
                            <li>Contenu P2 ligne 1</li>
                            <li>Contenu P2 ligne 2</li>
                        </ul>
                    </div>
                </div>
                <!-- P3 -->
                <div class="subject-box" data-subject="3">
                    <div class="subject-title" id="p3-title">SUJET 3</div>
                    <div class="subject-content-box">
                        <ul id="p3-content">
                            <li>Contenu P3 ligne 1</li>
                            <li>Contenu P3 ligne 2</li>
                        </ul>
                    </div>
                </div>
                <!-- P4 -->
                <div class="subject-box" data-subject="4">
                    <div class="subject-title" id="p4-title">SUJET 4</div>
                    <div class="subject-content-box">
                        <ul id="p4-content">
                            <li>Contenu P4 ligne 1</li>
                            <li>Contenu P4 ligne 2</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WS_URL = 'wss://ecamm-overlay-server.onrender.com';
        let ws;
        let currentFocus = 1;

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);
            
            ws.onopen = () => {
                console.log('✅ WebSocket connected');
                document.getElementById('status').textContent = 'Connecté';
                document.getElementById('status').className = 'status connected';
                ws.send(JSON.stringify({ type: 'init' }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('📩 Message reçu:', data);
                
                if (data.type === 'update') {
                    updateContent(data);
                } else if (data.type === 'focus') {
                    // Accepter 'focus' ou 'subjectIndex'
                    const focusValue = data.focus || data.subjectIndex;
                    changeFocus(focusValue);
                }
            };
            
            ws.onclose = () => {
                console.log('❌ WebSocket disconnected');
                document.getElementById('status').textContent = 'Déconnecté';
                document.getElementById('status').className = 'status disconnected';
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }

        function updateContent(data) {
            // Update title/subtitle
            if (data.titre) document.getElementById('mainTitle').textContent = data.titre;
            if (data.soustitre) document.getElementById('mainSubtitle').textContent = data.soustitre;
            
            // Update P1-P4 titles and content
            ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                if (data[p]) {
                    // Update subject title
                    if (data[p].sujet) {
                        const titleEl = document.getElementById(`${p}-title`);
                        if (titleEl) titleEl.textContent = data[p].sujet;
                    }
                    // Update content
                    if (data[p].contenu) {
                        const ul = document.getElementById(`${p}-content`);
                        ul.innerHTML = data[p].contenu.map(line => `<li>${line}</li>`).join('');
                    }
                }
            });
        }

        function changeFocus(focus) {
            // Accept 'p1', 'p2', etc. or just numbers
            let focusNum = focus;
            if (typeof focus === 'string') {
                focusNum = parseInt(focus.replace('p', ''));
            }
            
            if (focusNum >= 1 && focusNum <= 4) {
                currentFocus = focusNum;
                const orbitalSystem = document.getElementById('orbitalSystem');
                orbitalSystem.className = `orbital-system focus-${focusNum}`;
                console.log(`🎯 Focus changed to: P${focusNum}`);
            }
        }

        // Hide status on click
        document.getElementById('status').addEventListener('click', function() {
            this.classList.add('hidden');
        });

        // Connect on load
        connectWebSocket();
    </script>
</body>
</html>
